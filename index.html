// ── CONFIGURAÇÕES PAGE ──
const ConfiguracoesPage=({user,onUpdateUser,onLogout})=>{
  const [form,setForm]=useState({windsorKey:user.windsorKey||'',anthropicKey:user.anthropicKey||'',makeWebhook:user.makeWebhook||'',name:user.name||''});
  const [pw,setPw]=useState({old:'',new1:'',new2:''});
  const [msg,setMsg]=useState('');
  const [discovering,setDiscovering]=useState(false);
  const [discovered,setDiscovered]=useState([]);

  const save=()=>{
    const localData=getUserLocal(user.id)||{};
    saveUserLocal(user.id,{...localData,...form});
    onUpdateUser({...user,...form});setMsg('Configurações salvas!');
    setTimeout(()=>setMsg(''),3000);
  };

  const changePw=async()=>{
    if(!pw.new1||!pw.new2){setMsg('Preencha os campos de nova senha.');return;}
    if(pw.new1!==pw.new2){setMsg('As novas senhas não coincidem.');return;}
    if(pw.new1.length<6){setMsg('A nova senha deve ter pelo menos 6 caracteres.');return;}
    const {error}=await sb.auth.updateUser({password:pw.new1});
    if(error){setMsg('Erro: '+error.message);return;}
    setPw({old:'',new1:'',new2:''});setMsg('Senha alterada com sucesso!');
    setTimeout(()=>setMsg(''),3000);
  };

  const discoverAccounts=async()=>{
    if(!form.windsorKey){setMsg('Insira a chave Windsor primeiro.');return;}
    setDiscovering(true);setDiscovered([]);setMsg('');
    try{
      const d1=subDays(today(),3);
      const url=`https://connectors.windsor.ai/facebook?api_key=${form.windsorKey}&date_from=${d1}&date_to=${today()}&fields=account_id,account_name,spend`;
      const res=await fetch(url);
      if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(`Erro ${res.status}: ${t.slice(0,150)}`);}
      const json=await res.json();
      const raw=json.result||json.data||json;
      const rows=Array.isArray(raw)?raw:[];
      const accountMap=new Map();
      rows.forEach(r=>{if(r.account_id&&!accountMap.has(r.account_id))accountMap.set(r.account_id,{id:r.account_id,name:r.account_name||r.account_id});});
      const accounts=[...accountMap.values()];
      setDiscovered(accounts);
      if(accounts.length>0){setMsg(`✓ ${accounts.length} conta(s) Meta encontrada(s)!`);}
      else{setMsg(`Nenhuma conta encontrada. Resposta: ${JSON.stringify(json).slice(0,200)}`);}
    }catch(e){setMsg('Windsor: '+e.message);}
    setDiscovering(false);
  };

  return(<>
    <h2>Configurações</h2>
    {msg&&<div style={{background:msg.includes('Erro')||msg.includes('incorreta')||msg.includes('coincidem')?'rgba(239,68,68,.1)':'rgba(16,185,129,.1)',border:`1px solid ${msg.includes('Erro')||msg.includes('incorreta')||msg.includes('coincidem')?'rgba(239,68,68,.3)':'rgba(16,185,129,.3)'}`,borderRadius:'6px',padding:'8px 14px',fontSize:'13px',marginBottom:'16px',color:msg.includes('Erro')||msg.includes('incorreta')||msg.includes('coincidem')?'#f87171':'#34d399'}}>{msg}</div>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',maxWidth:'800px'}}>
      <div className="card">
        <h3 style={{marginTop:0}}>🔗 Integrações</h3>
        <div className="form-group">
          <label className="form-label">Chave Windsor.ai</label>
          <div style={{display:'flex',gap:'8px'}}>
            <input className="form-input" type="password" value={form.windsorKey} onChange={e=>setForm({...form,windsorKey:e.target.value})} placeholder="Sua chave Windsor"/>
            <button className="btn btn-secondary btn-sm" onClick={discoverAccounts} disabled={discovering} style={{whiteSpace:'nowrap'}}>{discovering?'⏳':'🔍 Descobrir contas'}</button>
          </div>
          {discovered.length>0&&<div style={{marginTop:'6px',padding:'8px',background:'rgba(16,185,129,.08)',borderRadius:'6px',fontSize:'12px',color:'#10b981'}}>✓ {discovered.length} conta(s): {discovered.map(a=>a.name||a.id).join(', ')}</div>}
        </div>
        <div className="form-group"><label className="form-label">Anthropic API Key</label><input className="form-input" type="password" value={form.anthropicKey} onChange={e=>setForm({...form,anthropicKey:e.target.value})} placeholder="sk-ant-..."/></div>
        <div className="form-group"><label className="form-label">Make.com Webhook URL</label><input className="form-input" type="text" value={form.makeWebhook} onChange={e=>setForm({...form,makeWebhook:e.target.value})} placeholder="https://hook.us2.make.com/..."/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={save}>💾 Salvar</button>
      </div>
      <div>
        <div className="card" style={{marginBottom:'14px'}}>
          <h3 style={{marginTop:0}}>👤 Perfil</h3>
          <div className="form-group"><label className="form-label">Nome</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'12px'}}>E-mail: {user.email}</div>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={save}>Salvar perfil</button>
        </div>
        <div className="card" style={{marginBottom:'14px'}}>
          <h3 style={{marginTop:0}}>🔑 Alterar Senha</h3>
          {[['old','Senha atual','password'],['new1','Nova senha','password'],['new2','Confirmar nova','password']].map(([k,l,t])=>(
            <div key={k} className="form-group"><label className="form-label">{l}</label><input className="form-input" type={t} value={pw[k]} onChange={e=>setPw({...pw,[k]:e.target.value})}/></div>
          ))}
          <button className="btn btn-secondary" style={{width:'100%'}} onClick={changePw}>Alterar senha</button>
        </div>
        <div className="card" style={{marginBottom:'14px'}}>
          <h3 style={{marginTop:0}}>Status</h3>
          {[['Windsor',form.windsorKey],['Anthropic',form.anthropicKey],['Make.com',form.makeWebhook]].map(([n,k])=>(
            <div key={n} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #1f2937',fontSize:'12px'}}>
              <span>{n}</span><span className={`badge ${k?'badge-green':'badge-gray'}`}>{k?'✓ Conectado':'Não configurado'}</span>
            </div>
          ))}
          <button className="btn btn-danger" style={{width:'100%',marginTop:'14px',fontSize:'12px'}} onClick={onLogout}>🚪 Sair</button>
        </div>
        <InviteUserCard adminEmail={user.email}/>
      </div>
    </div>
  </>);
};

// ── SIDEBAR ACCOUNT SELECTOR ──
const SidebarAccountSelector=({label,icon,color,rgb,ids,names,selected,onChange})=>{
  const [q,setQ]=useState('');
  const allSelected=selected===null;
  const noneSelected=selected!==null&&selected.length===0;
  const selArr=selected===null?ids:(selected||[]);
  const filtered=q.trim()?ids.filter(id=>(names[id]||id).toLowerCase().includes(q.toLowerCase())):ids;
  const allFilteredChecked=filtered.every(id=>selArr.includes(id));

  const toggle=id=>{
    const cur=selected===null?[...ids]:selected;
    const next=cur.includes(id)?cur.filter(x=>x!==id):[...cur,id];
    onChange(next.length===ids.length?null:next);
  };
  const selectAll=()=>onChange(null);
  const deselectAll=()=>onChange([]);
  const toggleFiltered=()=>{
    if(allFilteredChecked){
      // deselect only the filtered ones
      const cur=selected===null?[...ids]:selected;
      const next=cur.filter(id=>!filtered.includes(id));
      onChange(next.length===0?[]:next.length===ids.length?null:next);
    } else {
      // select all filtered
      const cur=selected===null?[...ids]:selected;
      const next=[...new Set([...cur,...filtered])];
      onChange(next.length===ids.length?null:next);
    }
  };

  return(
    <div style={{padding:'0 8px 10px'}}>
      {/* Header */}
      <div style={{fontSize:'10px',color:'#4b5563',marginBottom:'5px',textTransform:'uppercase',letterSpacing:'0.06em',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 2px'}}>
        <span style={{fontWeight:'700'}}>{icon} {label}</span>
        <div style={{display:'flex',gap:'6px'}}>
          <button style={{background:'none',border:'none',color:`rgb(${rgb})`,fontSize:'10px',cursor:'pointer',padding:0,fontWeight:'600'}} onClick={selectAll}>Todas</button>
          <span style={{color:'#374151'}}>·</span>
          <button style={{background:'none',border:'none',color:'#ef4444',fontSize:'10px',cursor:'pointer',padding:0,fontWeight:'600'}} onClick={deselectAll}>Nenhuma</button>
        </div>
      </div>
      {/* Search */}
      {ids.length>3&&(
        <div style={{position:'relative',marginBottom:'4px'}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar conta…"
            style={{width:'100%',padding:'4px 22px 4px 7px',background:'#0a0d14',border:'1px solid #1f2937',borderRadius:'5px',color:'#f1f5f9',fontSize:'11px',outline:'none',boxSizing:'border-box'}}/>
          {q?<button onClick={()=>setQ('')} style={{position:'absolute',right:'5px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:'11px',padding:0,lineHeight:1}}>✕</button>
            :<span style={{position:'absolute',right:'6px',top:'50%',transform:'translateY(-50%)',fontSize:'10px',color:'#374151',pointerEvents:'none'}}>🔍</span>}
        </div>
      )}
      {/* List */}
      <div style={{background:'#0a0d14',border:'1px solid #1f2937',borderRadius:'6px',maxHeight:'130px',overflowY:'auto',padding:'2px'}}>
        {filtered.length===0&&<div style={{padding:'8px',fontSize:'11px',color:'#4b5563',textAlign:'center'}}>Sem resultado</div>}
        {/* Select/deselect filtered */}
        {filtered.length>1&&q&&(
          <label style={{display:'flex',alignItems:'center',gap:'5px',padding:'3px 5px',cursor:'pointer',borderRadius:'4px',fontSize:'10px',color:'#6b7280',borderBottom:'1px solid #1f2937',marginBottom:'2px'}}>
            <input type="checkbox" checked={allFilteredChecked} onChange={toggleFiltered} style={{accentColor:`rgb(${rgb})`,width:'10px',height:'10px'}}/>
            <span style={{fontStyle:'italic'}}>{allFilteredChecked?'Desmarcar':'Marcar'} {filtered.length} resultado(s)</span>
          </label>
        )}
        {filtered.map(id=>{
          const checked=selected===null||selArr.includes(id);
          const name=names[id]||id;
          return(
            <label key={id} style={{display:'flex',alignItems:'center',gap:'5px',padding:'4px 5px',cursor:'pointer',borderRadius:'4px',fontSize:'11px',background:checked?`rgba(${rgb},.08)`:'transparent',transition:'background .1s'}}>
              <input type="checkbox" checked={checked} onChange={()=>toggle(id)} style={{accentColor:`rgb(${rgb})`,width:'11px',height:'11px',flexShrink:0}}/>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,color:checked?'#e2e8f0':'#4b5563'}} title={name}>{name}</span>
            </label>
          );
        })}
      </div>
      {/* Footer count */}
      <div style={{fontSize:'10px',marginTop:'3px',padding:'0 2px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{color:noneSelected?'#ef4444':'#4b5563'}}>
          {selected===null?`Todas (${ids.length})`:selected.length===0?'Nenhuma selecionada':`${selected.length} de ${ids.length} selecionada(s)`}
        </span>
        {selected!==null&&selected.length>0&&selected.length<ids.length&&(
          <button style={{background:'none',border:'none',color:'#6b7280',fontSize:'10px',cursor:'pointer',padding:0,textDecoration:'underline'}} onClick={selectAll}>Limpar filtro</button>
        )}
      </div>
    </div>
  );
};

const App=({user:initUser,onLogout})=>{
  const [user,setUser]=useState(initUser);
  const [page,setPage]=useState('dashboard');
  const [clients,setClients]=useState(()=>{
    const raw=user.clients||[];
    const migrated=raw.map(migrateClient).filter(Boolean);
    return migrated.length?migrated:DEMO_CLIENTS;
  });
  const lockedClientId=useMemo(()=>new URLSearchParams(window.location.search).get('client'),[]);
  const [activeClientId,setActiveClientId]=useState(()=>{const locked=new URLSearchParams(window.location.search).get('client');if(locked&&clients.find(c=>c.id===locked))return locked;return clients[0]?.id||'c1';});
  const [selectedMetaIds,setSelectedMetaIds]=useState(null);// null=todas
  const [selectedGoogleIds,setSelectedGoogleIds]=useState(null);// null=todas
  const initR=getRange('last7d');
  const [dateFrom,setDateFrom]=useState(initR.from);
  const [dateTo,setDateTo]=useState(initR.to);
  const [platforms,setPlatforms]=useState(['facebook','google_ads']);
  const [rawData,setRawData]=useState({});
  const [loading,setLoading]=useState(false);
  const [accountNamesCache,setAccountNamesCache]=useState({facebook:{},google_ads:{}});
  const [compareMode,setCompareMode]=useState(null);
  const [customCmpFrom,setCustomCmpFrom]=useState('');
  const [customCmpTo,setCustomCmpTo]=useState('');
  const [compareRawData,setCompareRawData]=useState({});
  const [showCmpPicker,setShowCmpPicker]=useState(false);

  // Reset seletores de conta ao trocar cliente
  useEffect(()=>{setSelectedMetaIds(null);setSelectedGoogleIds(null);},[activeClientId]);
  // Se link travado, bloqueia acesso a Clientes/Configurações
  useEffect(()=>{if(lockedClientId&&['clientes','configuracoes'].includes(page))setPage('dashboard');},[lockedClientId,page]);
  // Viewer não pode acessar Gestão
  useEffect(()=>{if(user.role==='viewer'&&['clientes','configuracoes'].includes(page))setPage('dashboard');},[user.role,page]);

  const activeClient=clients.find(c=>c.id===activeClientId)||clients[0]||DEMO_CLIENTS[0];
  const windsorKey=user.windsorKey||'';
  const anthropicKey=user.anthropicKey||'';
  const makeWebhook=user.makeWebhook||DEFAULT_WEBHOOK;
  const objConfig=useMemo(()=>getObjConfig(activeClient?.objective||'ecommerce',activeClient?.customEventLabel,activeClient?.customEventField),[activeClient]);

  // Auto-busca nomes das contas do Windsor para exibir no seletor
  useEffect(()=>{
    if(!windsorKey)return;
    const fetchNames=async()=>{
      const newCache={facebook:{},google_ads:{}};
      // Meta
      const metaIds=activeClient?.accounts?.facebook||[];
      if(metaIds.length){
        try{
          const d1=subDays(today(),3);
          const url=`https://connectors.windsor.ai/facebook?api_key=${windsorKey}&date_from=${d1}&date_to=${today()}&fields=account_id,account_name,spend`;
          const res=await fetch(url);
          if(res.ok){
            const json=await res.json();
            const raw=json.result||json.data||json;
            const rows=Array.isArray(raw)?raw:[];
            rows.forEach(r=>{if(r.account_id&&r.account_name)newCache.facebook[r.account_id]=r.account_name;});
          }
        }catch(e){console.log('Meta names fetch:',e.message);}
      }
      // Google Ads — tenta customer_id/customer_name e account_id/account_name
      const googleIds=activeClient?.accounts?.google_ads||[];
      if(googleIds.length){
        try{
          const d1=subDays(today(),3);
          const url=`https://connectors.windsor.ai/google_ads?api_key=${windsorKey}&date_from=${d1}&date_to=${today()}&fields=customer_id,customer_name,account_id,account_name,spend`;
          const res=await fetch(url);
          if(res.ok){
            const json=await res.json();
            const raw=json.result||json.data||json;
            const rows=Array.isArray(raw)?raw:[];
            rows.forEach(r=>{
              const id=r.customer_id||r.account_id;
              const name=r.customer_name||r.account_name;
              if(id&&name)newCache.google_ads[id]=name;
            });
          }
        }catch(e){console.log('Google names fetch:',e.message);}
      }
      setAccountNamesCache(prev=>({facebook:{...prev.facebook,...newCache.facebook},google_ads:{...prev.google_ads,...newCache.google_ads}}));
    };
    fetchNames();
  },[windsorKey,activeClientId]);

  const saveClients=useCallback(nc=>{
    setClients(nc);
    const localData=getUserLocal(user.id)||{};
    saveUserLocal(user.id,{...localData,clients:nc});
  },[user.id]);

  const updateUser=useCallback(updated=>{
    setUser(updated);
    const localData=getUserLocal(updated.id)||{};
    saveUserLocal(updated.id,{...localData,...updated});
  },[]);

  // Fetch Windsor data
  useEffect(()=>{
    let cancelled=false;
    const days=Math.max(1,Math.floor((new Date(dateTo)-new Date(dateFrom))/86400000)+1);
    const fetch_=async()=>{
      setLoading(true);
      setRawData({}); // limpa dados anteriores imediatamente
      const nd={};
      for(const plat of platforms){
        const allAccounts=activeClient?.accounts?.[plat]||[];
        const selIds=plat==='facebook'?selectedMetaIds:selectedGoogleIds;
        // null=todas; []= nenhuma; [id,...]= contas específicas
        const accounts=selIds===null?allAccounts:selIds.filter(id=>allAccounts.includes(id));
        if(!windsorKey){nd[plat]=genDemo(plat,days);continue;}
        if(!accounts.length){nd[plat]=[];continue;}
        try{
          // Adiciona account_id ao request para permitir filtro no cliente
          const customEvField=activeClient?.customEventField||'';
          const baseFB='date,account_id,campaign_name,adset_name,ad_name,spend,impressions,clicks,ctr,cpm,cpc,frequency,reach,actions_purchase,action_values_purchase,actions_add_to_cart,actions_initiate_checkout,actions_onsite_conversion_messaging_conversation_started_7d,actions_lead';
          const fields=plat==='facebook'
            ?(customEvField&&activeClient?.objective==='custom'&&!baseFB.includes(customEvField)?baseFB+','+customEvField:baseFB)
            :'date,account_id,customer_id,campaign,ad_group_name,ad_name,spend,impressions,clicks,ctr,cpc,conversions,cost_per_conversion';
          const url=`https://connectors.windsor.ai/${plat}?api_key=${windsorKey}&date_from=${dateFrom}&date_to=${dateTo}&fields=${fields}&accounts=${accounts.join(',')}`;
          const res=await fetch(url);
          if(!res.ok){const errText=await res.text().catch(()=>'');throw new Error(`HTTP ${res.status}: ${errText.slice(0,200)}`);}
          const json=await res.json();
          const rawRows=json.result||json.data||(Array.isArray(json)?json:[]);
          if(!Array.isArray(rawRows)||rawRows.length===0){
            console.warn(`Windsor ${plat}: resposta vazia`);
            nd[plat]=[];
            continue;
          }
          let rows=rawRows.map(r=>({
            ...r,
            campaign_name: r.campaign_name||r.campaign||'',
            adset_name: r.adset_name||r.ad_group_name||'',
            reach: r.reach||Math.floor((r.impressions||0)*0.82),
            frequency: r.frequency||(r.reach?(r.impressions||0)/r.reach:1),
            purchases: r.actions_purchase||r.conversions||0,
            purchase_value: r.action_values_purchase||0,
            add_to_cart: r.actions_add_to_cart||0,
            initiate_checkout: r.actions_initiate_checkout||0,
            messaging_conversations: r.actions_onsite_conversion_messaging_conversation_started_7d||0,
            lead: r.actions_lead||0,
            custom_event: (customEvField?r[customEvField]:null)??r.custom_event??0
          }));
          // Filtro no cliente — garante que só mostra as contas selecionadas
          // Normaliza prefixo act_ (Meta retorna act_123 mas armazenamos 123)
          if(selIds!==null&&selIds.length>0){
            const normSel=selIds.map(id=>String(id).replace(/^act_/,'').trim());
            rows=rows.filter(r=>{
              const rid=String(r.account_id||r.customer_id||'').replace(/^act_/,'').trim();
              if(!rid||rid==='null'||rid==='0'||rid==='undefined')return true;
              return normSel.includes(rid);
            });
          }
          nd[plat]=rows;
          console.log(`Windsor ${plat}: ${rows.length} rows (contas: ${selIds===null?'todas':selIds.join(',')})`);
        }catch(e){
          console.error(`Windsor ${plat} erro:`,e.message);
          nd[plat]=genDemo(plat,days);
          nd[`_err_${plat}`]=e.message;
        }
      }
      if(!cancelled){setRawData(nd);setLoading(false);}
    };
    fetch_();
    return()=>{cancelled=true;};
  },[dateFrom,dateTo,platforms.join(','),windsorKey,activeClientId,
     JSON.stringify(selectedMetaIds),JSON.stringify(selectedGoogleIds),
     (activeClient?.accounts?.facebook||[]).join(','),
     (activeClient?.accounts?.google_ads||[]).join(','),
     activeClient?.objective||'',activeClient?.customEventField||''
  ]);

  const allData=useMemo(()=>{
    let all=[];
    for(const p of platforms){if(rawData[p]?.length)all=all.concat(rawData[p].map(r=>({...r,_platform:p})));}
    return all;
  },[rawData,platforms]);

  const compareRange=useMemo(()=>compareMode?getCompareRange(dateFrom,dateTo,compareMode,customCmpFrom,customCmpTo):null,[compareMode,dateFrom,dateTo,customCmpFrom,customCmpTo]);

  // Fetch compare period data
  useEffect(()=>{
    if(!compareRange){setCompareRawData({});return;}
    let cancelled=false;
    const days=Math.max(1,Math.floor((new Date(compareRange.to)-new Date(compareRange.from))/86400000)+1);
    const fetch_=async()=>{
      const nd={};
      for(const plat of platforms){
        const allAccounts=activeClient?.accounts?.[plat]||[];
        const selIds=plat==='facebook'?selectedMetaIds:selectedGoogleIds;
        const accounts=selIds===null?allAccounts:selIds.filter(id=>allAccounts.includes(id));
        if(!windsorKey){nd[plat]=genDemo(plat,days);continue;}
        if(!accounts.length){nd[plat]=[];continue;}
        try{
          const customEvField=activeClient?.customEventField||'';
          const baseFB='date,account_id,campaign_name,adset_name,ad_name,spend,impressions,clicks,ctr,cpm,cpc,frequency,reach,actions_purchase,action_values_purchase,actions_add_to_cart,actions_initiate_checkout,actions_onsite_conversion_messaging_conversation_started_7d,actions_lead';
          const fields=plat==='facebook'?(customEvField&&activeClient?.objective==='custom'&&!baseFB.includes(customEvField)?baseFB+','+customEvField:baseFB):'date,account_id,customer_id,campaign,ad_group_name,ad_name,spend,impressions,clicks,ctr,cpc,conversions,cost_per_conversion';
          const url=`https://connectors.windsor.ai/${plat}?api_key=${windsorKey}&date_from=${compareRange.from}&date_to=${compareRange.to}&fields=${fields}&accounts=${accounts.join(',')}`;
          const res=await fetch(url);
          if(!res.ok)throw new Error(`HTTP ${res.status}`);
          const json=await res.json();
          const rawRows=json.result||json.data||(Array.isArray(json)?json:[]);
          if(!Array.isArray(rawRows)){nd[plat]=[];continue;}
          nd[plat]=rawRows.map(r=>({...r,campaign_name:r.campaign_name||r.campaign||'',adset_name:r.adset_name||r.ad_group_name||'',purchases:r.actions_purchase||r.conversions||0,purchase_value:r.action_values_purchase||0,add_to_cart:r.actions_add_to_cart||0,initiate_checkout:r.actions_initiate_checkout||0,messaging_conversations:r.actions_onsite_conversion_messaging_conversation_started_7d||0,lead:r.actions_lead||0,custom_event:0}));
        }catch(e){nd[plat]=genDemo(plat,days);}
      }
      if(!cancelled)setCompareRawData(nd);
    };
    fetch_();
    return()=>{cancelled=true;};
  },[compareRange?.from,compareRange?.to,platforms.join(','),windsorKey,activeClientId,JSON.stringify(selectedMetaIds),JSON.stringify(selectedGoogleIds)]);

  const compareAllData=useMemo(()=>{
    let all=[];
    for(const p of platforms){if(compareRawData[p]?.length)all=all.concat(compareRawData[p].map(r=>({...r,_platform:p})));}
    return all;
  },[compareRawData,platforms]);

  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const isAdmin=user.role!=='viewer';
  const NAV=[
    {s:'Principal',items:[{p:'dashboard',l:'Dashboard',i:'📊'},{p:'insights_campanhas',l:'Insights Campanhas',i:'🧠'},{p:'cerebro',l:'Cérebro Gestor',i:'🧬'}]},
    ...(isAdmin?[{s:'Gestão',items:[{p:'clientes',l:'Clientes',i:'👥'},{p:'configuracoes',l:'Configurações',i:'⚙️'}]}]:[]),
  ];

  const TITLES={dashboard:'Dashboard',insights_campanhas:'Insights de Campanhas',cerebro:'Cérebro Gestor',clientes:'Clientes',configuracoes:'Configurações'};

  const renderPage=()=>{
    if(loading)return<div style={{textAlign:'center',padding:'60px',color:'#6b7280'}}><div className="loading-pulse" style={{fontSize:'32px'}}>⏳</div><div style={{marginTop:'12px',fontSize:'14px'}}>Carregando{windsorKey?' dados Windsor':' demonstração'}…</div></div>;
    switch(page){
      case'dashboard':return<DashboardPage allData={allData} platforms={platforms} objConfig={objConfig} compareAllData={compareAllData} compareMode={compareMode}/>;
      case'insights_campanhas':return<InsightsCampanhasPage allData={allData} dateFrom={dateFrom} dateTo={dateTo} objConfig={objConfig}/>;
      case'cerebro':return<CerebroPage allData={allData} anthropicKey={anthropicKey} objConfig={objConfig} dateFrom={dateFrom} dateTo={dateTo}/>;
      case'clientes':return<ClientesPage clients={clients} onSave={saveClients} windsorKey={windsorKey}/>;
      case'configuracoes':return<ConfiguracoesPage user={user} onUpdateUser={updateUser} onLogout={onLogout}/>;
      default:return<DashboardPage allData={allData} platforms={platforms} objConfig={objConfig} compareAllData={compareAllData} compareMode={compareMode}/>;
    }
  };

  const metaAccIds=activeClient?.accounts?.facebook||[];
  // Combina nomes salvos + cache auto-buscado
  const metaNames={...(activeClient?.accounts?.facebookNames||{}),...accountNamesCache.facebook};
  const googleAccIds=activeClient?.accounts?.google_ads||[];
  const googleNames={...(activeClient?.accounts?.googleNames||{}),...accountNamesCache.google_ads};

  return(<>
    <div className={`sidebar${sidebarCollapsed?' collapsed':''}`}>
      <div className="sidebar-logo" style={{fontSize:'15px',letterSpacing:'0.01em',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span data-hide-collapsed="">{activeClient?.emoji||'🧠'} {activeClient?.name||'HeyCommerce OS'}</span>
        {sidebarCollapsed&&<span style={{fontSize:'18px'}}>{activeClient?.emoji||'🧠'}</span>}
        <button className="sidebar-toggle" onClick={()=>setSidebarCollapsed(p=>!p)} title={sidebarCollapsed?'Expandir menu':'Recolher menu'}>
          {sidebarCollapsed?'▶':'◀'}
        </button>
      </div>
      {/* Seletor de cliente */}
      {!sidebarCollapsed&&clients.length>1&&!lockedClientId&&(
        <select className="client-select" value={activeClientId} onChange={e=>setActiveClientId(e.target.value)}>
          {clients.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}
        </select>
      )}
      {/* Seletores de conta (ocultados quando collapsed) */}
      {!sidebarCollapsed&&metaAccIds.length>=1&&(
        <SidebarAccountSelector
          label="Meta Ads" icon="📘" color="#6366f1" rgb="99,102,241"
          ids={metaAccIds} names={metaNames}
          selected={selectedMetaIds} onChange={setSelectedMetaIds}
        />
      )}
      {!sidebarCollapsed&&googleAccIds.length>=1&&(
        <SidebarAccountSelector
          label="Google Ads" icon="🟢" color="#10b981" rgb="16,185,129"
          ids={googleAccIds} names={googleNames}
          selected={selectedGoogleIds} onChange={setSelectedGoogleIds}
        />
      )}
      {NAV.filter(s=>!lockedClientId||s.s!=='Gestão').map(s=>(
        <div key={s.s} className="sidebar-section">
          <div className="sidebar-section-title">{s.s}</div>
          <div className="sidebar-nav">
            {s.items.map(item=>(
              <button key={item.p} className={`nav-btn ${page===item.p?'active':''}`} onClick={()=>setPage(item.p)} title={sidebarCollapsed?item.l:''}>
                {item.i}{!sidebarCollapsed&&` ${item.l}`}
              </button>
            ))}
          </div>
        </div>
      ))}
      {!sidebarCollapsed&&<div className="sidebar-bottom">👤 {user.name||user.email}</div>}
    </div>
    <div className="main-content">
      <div className="topbar">
        <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
          <span className="topbar-title">{TITLES[page]||'HeyCommerce OS'}</span>
          {/* Indicador de conta ativa */}
          <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {metaAccIds.length>0&&(
              <span style={{fontSize:'10px',padding:'1px 6px',borderRadius:'4px',background:selectedMetaIds?.length===0?'rgba(239,68,68,.15)':'#1f2937',color:selectedMetaIds?.length===0?'#f87171':'#6b7280'}}>
                📘 {selectedMetaIds?.length===0?'Meta desativado':selectedMetaIds===null?`Todas Meta (${metaAccIds.length})`:`Meta: ${selectedMetaIds.length} conta(s)`}
              </span>
            )}
            {googleAccIds.length>0&&(
              <span style={{fontSize:'10px',padding:'1px 6px',borderRadius:'4px',background:selectedGoogleIds?.length===0?'rgba(239,68,68,.15)':'#1f2937',color:selectedGoogleIds?.length===0?'#f87171':'#6b7280'}}>
                🟢 {selectedGoogleIds?.length===0?'Google desativado':selectedGoogleIds===null?`Todas Google (${googleAccIds.length})`:`Google: ${selectedGoogleIds.length} conta(s)`}
              </span>
            )}
          </div>
        </div>
        <div className="topbar-controls">
          <div className="pill-filter">
            <button className={`pill ${platforms.includes('facebook')&&platforms.includes('google_ads')?'active':''}`} onClick={()=>setPlatforms(['facebook','google_ads'])}>Ambos</button>
            <button className={`pill ${platforms.length===1&&platforms[0]==='facebook'?'active':''}`} onClick={()=>setPlatforms(['facebook'])}>📘 Meta</button>
            <button className={`pill ${platforms.length===1&&platforms[0]==='google_ads'?'active':''}`} onClick={()=>setPlatforms(['google_ads'])}>🟢 Google</button>
          </div>
          <DatePicker from={dateFrom} to={dateTo} onChange={(f,t)=>{setDateFrom(f);setDateTo(t);}}/>
          {/* Compare Mode Selector */}
          <div className="dp-wrapper">
            <button className="dp-btn" style={compareMode?{borderColor:'#6366f1',color:'#818cf8'}:{}} onClick={()=>setShowCmpPicker(p=>!p)}>
              {compareMode?'📊 Comparando':'📊 Comparar'}
            </button>
            {showCmpPicker&&<div className="dropdown" style={{minWidth:'220px',right:0}}>
              <div style={{padding:'8px 14px 4px',fontSize:'10px',color:'#6b7280',textTransform:'uppercase',letterSpacing:'.05em'}}>Comparar com</div>
              {[['prev_period','Período anterior'],['prev_month','Mesmo período (mês passado)'],['prev_year','Mesmo período (ano passado)']].map(([k,l])=>(
                <button key={k} className="dropdown-item" style={compareMode===k?{color:'#818cf8',background:'rgba(99,102,241,.1)'}:{}}
                  onClick={()=>{setCompareMode(k);setShowCmpPicker(false);}}>
                  {compareMode===k?'✓ ':''}{l}
                </button>
              ))}
              <div className="dropdown-divider"/>
              <button className="dropdown-item" style={compareMode==='custom'?{color:'#818cf8',background:'rgba(99,102,241,.1)'}:{}}
                onClick={()=>setCompareMode('custom')}>
                {compareMode==='custom'?'✓ ':''}Personalizado
              </button>
              {compareMode==='custom'&&(
                <div style={{padding:'8px 10px'}}>
                  <input type="date" value={customCmpFrom} onChange={e=>setCustomCmpFrom(e.target.value)} style={{width:'100%',padding:'5px',marginBottom:'5px',background:'#0a0d14',border:'1px solid #1f2937',borderRadius:'4px',color:'#f1f5f9',fontSize:'11px'}}/>
                  <input type="date" value={customCmpTo} onChange={e=>setCustomCmpTo(e.target.value)} style={{width:'100%',padding:'5px',marginBottom:'6px',background:'#0a0d14',border:'1px solid #1f2937',borderRadius:'4px',color:'#f1f5f9',fontSize:'11px'}}/>
                  <button className="btn btn-primary" style={{width:'100%',padding:'5px',fontSize:'12px'}} onClick={()=>setShowCmpPicker(false)}>Aplicar</button>
                </div>
              )}
              {compareMode&&<><div className="dropdown-divider"/>
                <button className="dropdown-item" style={{color:'#ef4444'}} onClick={()=>{setCompareMode(null);setShowCmpPicker(false);}}>✕ Desativar comparação</button>
              </>}
            </div>}
          </div>
        </div>
      </div>
      <div className="page-content">
        {!windsorKey&&<div className="notice">⚠️ Exibindo dados de demonstração. <button style={{background:'none',border:'none',color:'#fb923c',cursor:'pointer',textDecoration:'underline',fontSize:'inherit'}} onClick={()=>setPage('configuracoes')}>Configure sua chave Windsor</button> para dados reais.</div>}
        {renderPage()}
      </div>
    </div>
  </>);
};

// ── ROOT (Auth Controller) ──
const Root=()=>{
  const [authState,setAuthState]=useState({screen:'loading',user:null});

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        const localData=getUserLocal(session.user.id);
        setAuthState({screen:'app',user:buildUser(session.user,localData,session.access_token)});
      } else {
        setAuthState({screen:'login',user:null});
      }
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT')setAuthState({screen:'login',user:null});
      if(event==='PASSWORD_RECOVERY')setAuthState({screen:'reset',user:null});
      if(event==='TOKEN_REFRESHED'&&session){
        setAuthState(prev=>prev.screen==='app'?{...prev,user:{...prev.user,_token:session.access_token}}:prev);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=u=>setAuthState({screen:'app',user:u});
  const handleLogout=async()=>{await sb.auth.signOut();setAuthState({screen:'login',user:null});};
  const handleOnboard=u=>setAuthState({screen:'app',user:u});

  if(authState.screen==='loading')return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0d14',flexDirection:'column',gap:'12px'}}>
      <div style={{fontSize:'28px'}}>🧠</div>
      <div style={{color:'#6b7280',fontSize:'13px'}}>Carregando HeyCommerce OS…</div>
    </div>
  );
  if(authState.screen==='reset')return<ResetPasswordPage onDone={()=>setAuthState({screen:'login',user:null})}/>;
  if(authState.screen==='onboard')return<OnboardingPage onDone={handleOnboard}/>;
  if(authState.screen==='login')return<LoginPage onLogin={handleLogin} onShowOnboard={()=>setAuthState({screen:'onboard',user:null})}/>;
  return<App user={authState.user} onLogout={handleLogout}/>;
};

ReactDOM.render(<ErrorBoundary><Root/></ErrorBoundary>,document.getElementById('root'));
</script>
</body>
</html>
