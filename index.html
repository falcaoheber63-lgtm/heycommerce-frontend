// ── ACTIVE ITEMS HELPER ──
// Retorna Set de nomes que tiveram gasto nos últimos 7 dias do período selecionado
const getActiveSet=(allData,field)=>{
  if(!allData.length)return new Set();
  const dates=allData.map(r=>r.date).filter(Boolean).sort();
  const maxDate=dates[dates.length-1];
  const cutoff=subDays(maxDate,7);
  const s=new Set();
  allData.forEach(r=>{if(r.date>=cutoff&&(r.spend||0)>0)s.add(r[field]);});
  return s;
};

            date:ds,campaign_name:campaign,adset_name:adset,ad_group_name:adset,ad_name:ad,

            ctr:+(clicks/impressions).toFixed(4),
            cpm:+(spend/impressions*1000).toFixed(2),
            cpc:+(spend/clicks).toFixed(2),
            reach,frequency:+freq.toFixed(2),
            add_to_cart,initiate_checkout,purchases,
            purchase_value:+purchase_value.toFixed(2),
            messaging_conversations,custom_event
          });
        });
      });
    });
  }
  return rows;
};

// ── AGGREGATION ──
const aggBy=(rows,field)=>{
  const g={};
  for(const r of rows){
    const k=r[field]||'Unknown';
    if(!g[k])g[k]={name:k,spend:0,impressions:0,clicks:0,reach:0,freq_sum:0,conversions:0,add_to_cart:0,initiate_checkout:0,purchases:0,purchase_value:0,messaging_conversations:0,custom_event:0,lead:0,cnt:0};
    g[k].spend+=r.spend||0;g[k].impressions+=r.impressions||0;g[k].clicks+=r.clicks||0;
    g[k].reach+=r.reach||0;g[k].freq_sum+=r.frequency||0;
    g[k].add_to_cart+=r.add_to_cart||0;g[k].initiate_checkout+=r.initiate_checkout||0;
    g[k].purchases+=r.purchases||0;g[k].purchase_value+=r.purchase_value||0;
    g[k].messaging_conversations+=r.messaging_conversations||0;
    g[k].custom_event+=r.custom_event||0;g[k].lead+=r.lead||0;g[k].cnt++;
  }
  return Object.values(g).map(x=>({
    ...x,
    ctr:x.impressions>0?x.clicks/x.impressions:0,
    cpm:x.impressions>0?(x.spend/x.impressions)*1000:0,
    cpc:x.clicks>0?x.spend/x.clicks:0,
    frequency:x.cnt>0?x.freq_sum/x.cnt:0,
    cost_per_purchase:x.purchases>0?x.spend/x.purchases:0,
    cost_per_lead:x.lead>0?x.spend/x.lead:0,
    cost_per_messaging:x.messaging_conversations>0?x.spend/x.messaging_conversations:0,
    cost_per_custom:x.custom_event>0?x.spend/x.custom_event:0,
    roas:x.spend>0?x.purchase_value/x.spend:0,
    cost_per_cart:x.add_to_cart>0?x.spend/x.add_to_cart:0,
    cost_per_checkout:x.initiate_checkout>0?x.spend/x.initiate_checkout:0,
    checkout_conv_rate:x.initiate_checkout>0?x.purchases/x.initiate_checkout:0,
    cart_to_checkout:x.add_to_cart>0?x.initiate_checkout/x.add_to_cart:0,
  })).sort((a,b)=>b.spend-a.spend);
};

const timeSeries=(rows,field,names,gran,metric)=>{
  if(!names||!names.length)return{};
  const filtered=rows.filter(r=>names.includes(r[field]));
  const grp={};
  for(const r of filtered){
    let dk=r.date;
    if(gran==='weekly'){const d=new Date(r.date+'T00:00:00');d.setDate(d.getDate()-d.getDay()+1);dk=d.toISOString().split('T')[0];}
    else if(gran==='monthly')dk=r.date.slice(0,7);
    const k=`${r[field]}|${dk}`;
    if(!grp[k])grp[k]={e:r[field],d:dk,spend:0,impressions:0,clicks:0,fs:0,cnt:0,purchases:0,purchase_value:0,add_to_cart:0,initiate_checkout:0,messaging_conversations:0,custom_event:0};
    grp[k].spend+=r.spend||0;grp[k].impressions+=r.impressions||0;grp[k].clicks+=r.clicks||0;grp[k].fs+=r.frequency||0;grp[k].cnt++;
    grp[k].purchases+=r.purchases||0;grp[k].purchase_value+=r.purchase_value||0;
    grp[k].add_to_cart+=r.add_to_cart||0;grp[k].initiate_checkout+=r.initiate_checkout||0;
    grp[k].messaging_conversations+=r.messaging_conversations||0;grp[k].custom_event+=r.custom_event||0;
  }
  const res={};
  for(const k in grp){
    const g=grp[k];
    let v=0;
    switch(metric){
      case'spend':v=g.spend;break;case'impressions':v=g.impressions;break;case'clicks':v=g.clicks;break;
      case'ctr':v=g.impressions>0?(g.clicks/g.impressions)*100:0;break;
      case'cpm':v=g.impressions>0?(g.spend/g.impressions)*1000:0;break;
      case'cpc':v=g.clicks>0?g.spend/g.clicks:0;break;
      case'frequency':v=g.cnt>0?g.fs/g.cnt:0;break;
      case'purchases':v=g.purchases;break;
      case'purchase_value':v=g.purchase_value;break;
      case'add_to_cart':v=g.add_to_cart;break;
      case'cost_per_purchase':v=g.purchases>0?g.spend/g.purchases:0;break;
      case'roas':v=g.spend>0?g.purchase_value/g.spend:0;break;
      case'messaging_conversations':v=g.messaging_conversations;break;
      case'custom_event':v=g.custom_event;break;
      default:v=g.spend;
    }
    if(!res[g.e])res[g.e]=[];
    res[g.e].push({date:g.d,value:+v.toFixed(2)});
  }
  for(const e in res)res[e].sort((a,b)=>new Date(a.date)-new Date(b.date));
  return res;
};

// ── SMART INSIGHTS ENGINE ──
const generateInsights=(allData,dateFrom,dateTo)=>{
  const campaigns=aggBy(allData,'campaign_name');
  const mid=midDate(dateFrom,dateTo);
  const scale=[],warning=[],critical=[],info=[];

  campaigns.forEach(camp=>{
    const cd=allData.filter(r=>r.campaign_name===camp.name);
    const h1=cd.filter(r=>r.date<mid);
    const h2=cd.filter(r=>r.date>=mid);

    // Trend calculation
    const avg=(arr,f)=>arr.length?arr.reduce((s,r)=>s+(r[f]||0),0)/arr.length:0;
    const sum=(arr,f)=>arr.reduce((s,r)=>s+(r[f]||0),0);
    const ctrA=avg(h1,'ctr'),ctrB=avg(h2,'ctr');
    const cpcA=avg(h1,'cpc'),cpcB=avg(h2,'cpc');
    const ctrDelta=ctrA>0?(ctrB-ctrA)/ctrA:0;
    const cpcDelta=cpcA>0?(cpcB-cpcA)/cpcA:0;
    const isMsg=camp.name.toLowerCase().includes('mensag')||camp.name.toLowerCase().includes('whats')||camp.name.toLowerCase().includes('message');
    const isSales=camp.purchases>0||camp.add_to_cart>0;

    // 🔴 Creative fatigue / audience saturation
    if(h1.length>0&&h2.length>0&&ctrDelta<-0.25&&cpcDelta>0.20){
      critical.push({
        campaign:camp.name,icon:'🔴',type:'fadiga',
        title:'Fadiga de criativo/público detectada',
        msg:`CTR caiu ${Math.abs((ctrDelta*100).toFixed(0))}% e CPC subiu ${(cpcDelta*100).toFixed(0)}% no período. Público saturado ou criativo com desgaste.`,
        actions:['Renovar criativos','Expandir audiência','Pausar criativos com frequência > 3.5x']
      });
    } else if(h1.length>0&&h2.length>0&&ctrDelta<-0.15){
      warning.push({
        campaign:camp.name,icon:'🟡',type:'ctr_queda',
        title:'CTR em queda',
        msg:`CTR caiu ${Math.abs((ctrDelta*100).toFixed(0))}% na segunda metade do período. Monitorar criativos e frequência.`,
        actions:['Verificar frequência dos criativos','Testar novo formato de anúncio']
      });
    }

    // 🔴 Checkout critical
    if(isSales&&camp.initiate_checkout>8){
      const rate=camp.checkout_conv_rate;
      if(rate<0.05){
        critical.push({
          campaign:camp.name,icon:'🔴',type:'checkout_critico',
          title:'Problema crítico no checkout',
          msg:`Apenas ${(rate*100).toFixed(1)}% de quem inicia checkout finaliza a compra. Possível causa: obrigatoriedade de criar conta, checkout complexo, poucos selos de confiança, erro técnico.`,
          actions:['Ativar checkout como convidado','Adicionar selos de segurança','Verificar erros no checkout','Reduzir campos obrigatórios']
        });
      } else if(rate<0.30){
        warning.push({
          campaign:camp.name,icon:'🟡',type:'checkout_fraco',
          title:`Checkout abaixo de 30% (${(rate*100).toFixed(0)}%)`,
          msg:`Taxa de conversão do checkout está abaixo da meta de 30%. Oportunidade de melhoria significativa.`,
          actions:['Adicionar timer de urgência','Oferecer frete grátis','Simplificar processo de pagamento','Mostrar avaliações no checkout']
        });
      }
    }

    // 🟡 Cart abandonment
    if(isSales&&camp.add_to_cart>8){
      const rate=camp.cart_to_checkout;
      if(rate<0.35){
        warning.push({
          campaign:camp.name,icon:'🟡',type:'abandono_carrinho',
          title:`Alto abandono de carrinho (${(rate*100).toFixed(0)}% vão ao checkout)`,
          msg:`Menos de 35% de quem adiciona ao carrinho inicia o checkout. Causas: frete caro, produto sem estoque, preço alto, página lenta.`,
          actions:['Verificar disponibilidade do produto','Revisar política de frete','Testar retargeting de carrinho','Revisar preço vs concorrente']
        });
      }
    }

    // 🟡 Message campaign cost increase
    if(isMsg&&camp.messaging_conversations>0){
      const cpMsg=camp.cost_per_messaging;
      if(cpMsg>50){
        warning.push({
          campaign:camp.name,icon:'🟡',type:'custo_mensagem',
          title:`Custo por conversa elevado: ${R$(cpMsg)}`,
          msg:`Custo por conversa acima de R$50. Avaliar se o público está saturado ou se o criativo precisa de atualização.`,
          actions:['Trocar público-alvo','Renovar criativo (copy e visual)','Testar horários de exibição diferentes']
        });
      }
    }

    // 🟢 Scaling opportunity
    const goodCtr=camp.ctr>0.012;
    const stable=h1.length===0||ctrDelta>-0.10;
    const cpcOk=h1.length===0||cpcDelta<0.15;
    const goodRoas=camp.roas>=2.5||(!isSales&&camp.spend>300);
    if(goodCtr&&stable&&cpcOk&&goodRoas){
      scale.push({
        campaign:camp.name,icon:'🟢',type:'escalar',
        title:'Candidata para escalar',
        msg:`CTR ${(camp.ctr*100).toFixed(2)}% estável${camp.roas>0?' · ROAS '+camp.roas.toFixed(1)+'x':''} · CPC controlado. Bom momento para aumentar investimento.`,
        actions:['Aumentar orçamento 20-30%','Duplicar para novo público','Expandir para lookalike 2-3%']
      });
    }

    // 🔴 High CPA
    if(isSales&&camp.cost_per_purchase>0&&camp.cost_per_purchase>300){
      critical.push({
        campaign:camp.name,icon:'🔴',type:'cpa_alto',
        title:`Custo por compra crítico: ${R$(camp.cost_per_purchase)}`,
        msg:`Custo por compra muito alto. Revisar funil completo: criativo, público, oferta e página de destino.`,
        actions:['Pausar conjuntos com CAC mais alto','Testar oferta diferente','Revisar landing page']
      });
    }
  });

  // Top creatives eating budget without converting
  const creatives=aggBy(allData,'ad_name');
  creatives.forEach(cr=>{
    if(cr.spend>500&&cr.purchases===0&&cr.roas===0&&allData.some(r=>r.purchases>0)){
      info.push({
        campaign:cr.name,icon:'💡',type:'criativo_sem_conversao',
        title:`Criativo consumindo orçamento sem conversões`,
        msg:`"${cr.name}" gastou ${R$(cr.spend)} sem gerar compras. Considere pausar ou trocar por variação com melhor performance.`,
        actions:['Pausar este criativo','Testar nova copy','Analisar se CTR/engajamento é bom']
      });
    }
  });

  return{scale,warning,critical,info};
};

// ── LINE CHART ──
const LineChart=({data,metric,colors,w=780,h=340})=>{
  const C=colors||['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444'];
  const p={t:18,r:16,b:32,l:54};
  const cw=w-p.l-p.r,ch=h-p.t-p.b;
  if(!data||!Object.keys(data).length)return<div className="chart-empty">Selecione itens para comparar</div>;
  const pts=Object.values(data).flat().map(x=>x.value);
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const dates=[...new Set(Object.values(data).flat().map(x=>x.date))].sort();
  const gx=d=>{const i=dates.indexOf(d);return p.l+(dates.length>1?i/(dates.length-1)*cw:cw/2);};
  const gy=v=>p.t+ch-((v-mn)/rng)*ch;
  const em={};Object.keys(data).forEach((e,i)=>em[e]=C[i%C.length]);
  return(
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%">
      {[0,.25,.5,.75,1].map(pct=><line key={pct} x1={p.l} y1={p.t+pct*ch} x2={w-p.r} y2={p.t+pct*ch} stroke="#1f2937" strokeDasharray="3" strokeWidth="1"/>)}
      <line x1={p.l} y1={p.t} x2={p.l} y2={h-p.b} stroke="#374151" strokeWidth="1"/>
      <line x1={p.l} y1={h-p.b} x2={w-p.r} y2={h-p.b} stroke="#374151" strokeWidth="1"/>
      {[0,.25,.5,.75,1].map(pct=>{const v=mn+pct*rng;return<text key={pct} x={p.l-6} y={p.t+(1-pct)*ch+4} textAnchor="end" fontSize="10" fill="#6b7280">{v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(v<10?1:0)}</text>;})}
      {dates.map((d,i)=>{if(dates.length<=8||i%Math.ceil(dates.length/6)===0||i===dates.length-1)return<text key={d} x={gx(d)} y={h-p.b+13} textAnchor="middle" fontSize="10" fill="#6b7280">{fmtDate(d)}</text>;return null;})}
      {Object.keys(data).map(e=>{
        const pts2=data[e];if(!pts2||!pts2.length)return null;
        const path=pts2.map((p2,i)=>`${i===0?'M':'L'}${gx(p2.date)},${gy(p2.value)}`).join(' ');
        return<g key={e}><path d={path} fill="none" stroke={em[e]} strokeWidth="2"/>{pts2.map(p2=><circle key={`${e}${p2.date}`} cx={gx(p2.date)} cy={gy(p2.value)} r="3" fill={em[e]}/>)}</g>;
      })}
      {Object.keys(data).map((e,i)=><g key={`lg${e}`} transform={`translate(${p.l+i*130},${h-6})`}><rect width="9" height="9" rx="2" fill={em[e]}/><text x="12" y="8" fontSize="10" fill="#9ca3af">{e.length>14?e.slice(0,13)+'…':e}</text></g>)}
    </svg>
  );
};

// ── ERROR BOUNDARY ──
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div className="error-screen">
        <div style={{fontSize:'36px'}}>⚠️</div>
        <h2 style={{color:'#ef4444'}}>Erro inesperado</h2>
        <p style={{fontSize:'13px'}}>{this.state.err.toString()}</p>
        <button className="btn btn-primary" onClick={()=>{localStorage.clear();window.location.reload();}}>Limpar dados e recarregar</button>
      </div>
    );
    return this.props.children;
  }
}

};

// ── ONBOARDING ──
const OnboardingPage=({onDone})=>{
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:'',email:'',pw:'',pw2:'',windsorKey:'',anthropicKey:'',makeWebhook:'',clientName:'',facebookId:'',googleId:''});
  const [err,setErr]=useState('');
  const [discovering,setDiscovering]=useState(false);
  const [discovered,setDiscovered]=useState([]);

  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const discoverWindsor=async()=>{
    if(!form.windsorKey){setErr('Insira a chave Windsor primeiro.');return;}
    setDiscovering(true);setDiscovered([]);setErr('');
    try{
      // Busca sem filtro de contas para descobrir todas as contas disponíveis
      const d1=subDays(today(),3);
      const url=`https://connectors.windsor.ai/facebook?api_key=${form.windsorKey}&date_from=${d1}&date_to=${today()}&fields=account_id,account_name,spend`;
      const res=await fetch(url);
      if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(`Erro ${res.status}: ${t.slice(0,150)}`);}
      const json=await res.json();
      const raw=json.result||json.data||json;
      const rows=Array.isArray(raw)?raw:[];
      const accountMap=new Map();
      rows.forEach(r=>{if(r.account_id&&!accountMap.has(r.account_id))accountMap.set(r.account_id,{id:r.account_id,name:r.account_name||r.account_id});});
      const accounts=[...accountMap.values()];
      setDiscovered(accounts);
      if(accounts.length>0)f('facebookId',accounts.map(a=>a.id).join(','));
      else setErr(`Nenhuma conta Meta encontrada. Resposta da API: ${JSON.stringify(json).slice(0,200)}`);
    }catch(e){setErr('Windsor: '+e.message);}
    setDiscovering(false);
  };

  const [registering,setRegistering]=useState(false);

  const next=async()=>{
    setErr('');
    if(step===0){
      if(!form.name||!form.email||!form.pw)return setErr('Preencha todos os campos.');
      if(form.pw!==form.pw2)return setErr('As senhas não coincidem.');
      if(form.pw.length<6)return setErr('A senha deve ter pelo menos 6 caracteres.');
    }
    if(step<2){setStep(s=>s+1);}else{await finish();}
  };

  const finish=async()=>{
    setRegistering(true);setErr('');
    const {data,error}=await sb.auth.signUp({email:form.email,password:form.pw});
    if(error){setErr(error.message);setRegistering(false);return;}
    const uid=data.user.id;
    const clients=[{
      id:'c1',name:form.clientName||'Minha Empresa',emoji:'🎯',color:'#6366f1',
      accounts:{facebook:form.facebookId?form.facebookId.split(',').map(s=>s.trim()).filter(Boolean):[],google_ads:form.googleId?form.googleId.split(',').map(s=>s.trim()).filter(Boolean):[]}
    }];
    const localData={name:form.name,windsorKey:form.windsorKey,anthropicKey:form.anthropicKey,makeWebhook:form.makeWebhook||DEFAULT_WEBHOOK,clients};
    saveUserLocal(uid,localData);
    setRegistering(false);
    onDone(buildUser(data.user,localData,data.session?.access_token));
  };

  const steps=['Conta','Clientes','Pronto'];
  return(
    <div className="login-screen">
      <div className="login-box" style={{maxWidth:'460px'}}>
        <div className="login-logo">🧠 HeyCommerce OS</div>
        <div style={{display:'flex',gap:'6px',justifyContent:'center',margin:'14px 0 20px'}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'24px',height:'24px',borderRadius:'50%',background:i<step?'#10b981':i===step?'#6366f1':'#1f2937',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',color:'#fff'}}>{i<step?'✓':i+1}</div>
              {i<steps.length-1&&<div style={{width:'30px',height:'2px',background:i<step?'#10b981':'#1f2937'}}/>}
            </div>
          ))}
        </div>
        {err&&<div className="login-error">{err}</div>}

        {step===0&&(
          <div>
            <div className="onboard-step-title">Criar sua conta</div>
            <div className="onboard-step-sub">Você será o administrador da plataforma.</div>
            {[['name','Nome completo','text','Seu nome'],['email','E-mail','email','seu@email.com'],['pw','Senha','password','Mínimo 6 caracteres'],['pw2','Confirmar senha','password','Repita a senha']].map(([k,l,t,ph])=>(
              <div key={k} className="form-group">
                <label className="form-label">{l}</label>
                <input className="form-input" type={t} value={form[k]} onChange={e=>f(k,e.target.value)} placeholder={ph}/>
              </div>
            ))}
          </div>
        )}

        {step===1&&(
          <div>
            <div className="onboard-step-title">Adicionar primeiro cliente</div>
            <div className="onboard-step-sub">Configure os IDs das contas de anúncio.</div>
            <div className="form-group">
              <label className="form-label">Nome do cliente/empresa</label>
              <input className="form-input" type="text" value={form.clientName} onChange={e=>f('clientName',e.target.value)} placeholder="Ex: Minha Empresa"/>
            </div>
            <div className="form-group">
              <label className="form-label">📘 IDs Meta Ads (separar por vírgula)</label>
              <input className="form-input" type="text" value={form.facebookId} onChange={e=>f('facebookId',e.target.value)} placeholder="1234567890, 0987654321"/>
              <div className="form-hint">Você pode deixar em branco e configurar depois em Clientes</div>
            </div>
            <div className="form-group">
              <label className="form-label">🟢 IDs Google Ads (separar por vírgula)</label>
              <input className="form-input" type="text" value={form.googleId} onChange={e=>f('googleId',e.target.value)} placeholder="123-456-7890"/>
            </div>
          </div>
        )}

        {step===2&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:'48px',marginBottom:'12px'}}>🎉</div>
            <div className="onboard-step-title" style={{textAlign:'center'}}>Tudo pronto!</div>
            <div style={{fontSize:'13px',color:'#6b7280',marginTop:'8px'}}>Sua plataforma está configurada. Clique em Entrar para começar.</div>
          </div>
        )}

        <div style={{display:'flex',gap:'8px',marginTop:'20px'}}>
          {step>0&&step<2&&<button className="btn btn-secondary" style={{flex:1}} onClick={()=>setStep(s=>s-1)}>Voltar</button>}
          <button className="btn btn-primary" style={{flex:1,padding:'10px'}} onClick={next} disabled={registering}>
            {registering?'Criando conta…':step===2?'🚀 Entrar':step===1?'Finalizar':'Próximo →'}
          </button>
        </div>
        {step===1&&<div style={{textAlign:'center',marginTop:'10px'}}><button style={{background:'none',border:'none',color:'#4b5563',cursor:'pointer',fontSize:'11px'}} onClick={finish}>Pular este passo</button></div>}
      </div>
    </div>
  );
};

// ── DASHBOARD PAGE ──
const DashboardPage=({allData,platforms,objConfig={},compareAllData=[],compareMode=null})=>{
  const [dashTab,setDashTab]=useState('overview');
  const [campFilter,setCampFilter]=useState([]);
  const [showCampPicker,setShowCampPicker]=useState(false);
  const [crFilter,setCrFilter]=useState('');
  const [activeOnly,setActiveOnly]=useState(false);
  const [campSort,setCampSort]=useState({col:'spend',dir:'desc'});
  const [adsetSort,setAdsetSort]=useState({col:'spend',dir:'desc'});
  const [crSort,setCrSort]=useState({col:'spend',dir:'desc'});
  const obj=objConfig;

  const allCamps=useMemo(()=>aggBy(allData,'campaign_name'),[allData]);
  const filteredData=useMemo(()=>campFilter.length>0?allData.filter(r=>campFilter.includes(r.campaign_name)):allData,[allData,campFilter]);
  const filteredCmp=useMemo(()=>campFilter.length>0?compareAllData.filter(r=>campFilter.includes(r.campaign_name)):compareAllData,[compareAllData,campFilter]);
  const camps=useMemo(()=>aggBy(filteredData,'campaign_name'),[filteredData]);
  const adsets=useMemo(()=>aggBy(filteredData,'adset_name'),[filteredData]);

  // Map compare data by name for quick lookup
  const cmpCampsMap=useMemo(()=>{const m={};aggBy(filteredCmp,'campaign_name').forEach(c=>{m[c.name]=c;});return m;},[filteredCmp]);
  const cmpAdsetsMap=useMemo(()=>{const m={};aggBy(filteredCmp,'adset_name').forEach(a=>{m[a.name]=a;});return m;},[filteredCmp]);

  // Global KPIs
  const ts=filteredData.reduce((s,r)=>s+(r.spend||0),0);
  const ti=filteredData.reduce((s,r)=>s+(r.impressions||0),0);
  const tc=filteredData.reduce((s,r)=>s+(r.clicks||0),0);
  const tResult=filteredData.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0);
  const tValue=obj.valueField?filteredData.reduce((s,r)=>s+(r[obj.valueField]||0),0):0;
  const ta=filteredData.reduce((s,r)=>s+(r.add_to_cart||0),0);
  const roas=ts>0&&tValue>0?tValue/ts:0;
  const costResult=tResult>0?ts/tResult:0;

  const hasCmp=compareMode&&filteredCmp.length>0;
  const cs=hasCmp?filteredCmp.reduce((s,r)=>s+(r.spend||0),0):null;
  const ci=hasCmp?filteredCmp.reduce((s,r)=>s+(r.impressions||0),0):null;
  const cc=hasCmp?filteredCmp.reduce((s,r)=>s+(r.clicks||0),0):null;
  const cResult=hasCmp?filteredCmp.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0):null;
  const cValue=hasCmp&&obj.valueField?filteredCmp.reduce((s,r)=>s+(r[obj.valueField]||0),0):null;
  const ca=hasCmp?filteredCmp.reduce((s,r)=>s+(r.add_to_cart||0),0):null;
  const cRoas=cs>0&&cValue>0?cValue/cs:0;
  const cCostResult=cResult>0?cs/cResult:0;

  const Δ=(curr,prev,inv=false)=>{
    if(prev===null||prev===undefined||prev===0)return null;
    const pct=((curr-prev)/Math.abs(prev))*100;
    return inv?-pct:pct;
  };
  const fmtV=(v,f)=>{if(f==='R$')return R$(v);if(f==='N')return N(Math.round(v));if(f==='X')return v.toFixed(2)+'x';if(f==='%')return v.toFixed(2)+'%';return v;};

  // Delta badge inline
  const D=({d,inv})=>{
    const dv=d!=null?d:null;
    if(dv===null)return null;
    const pos=dv>=0;
    return<div style={{fontSize:'10px',color:pos?'#10b981':'#ef4444',fontWeight:'700',lineHeight:1.2}}>{pos?'▲':'▼'} {Math.abs(dv).toFixed(1)}%</div>;
  };

  const kpis=[
    {l:'Investimento',v:ts,fmt:'R$',d:Δ(ts,cs,true)},
    {l:'Impressões',v:ti,fmt:'N',d:Δ(ti,ci)},
    {l:'Cliques',v:tc,fmt:'N',d:Δ(tc,cc)},
    {l:obj.resultLabel||'Resultado',v:tResult,fmt:'N',d:Δ(tResult,cResult)},
    ...(obj.valueField?[{l:obj.valueLabel||'Receita',v:tValue,fmt:'R$',d:Δ(tValue,cValue)}]:[]),
    ...(obj.showRoas?[{l:'ROAS',v:roas,fmt:'X',d:Δ(roas,cRoas)}]:[]),
    {l:'Adições ao Carrinho',v:ta,fmt:'N',d:Δ(ta,ca)},
    {l:'CTR Médio',v:ti>0?(tc/ti)*100:0,fmt:'%',d:Δ(ti>0?(tc/ti)*100:0,ci>0?(cc/ci)*100:null)},
    {l:'CPC Médio',v:tc>0?ts/tc:0,fmt:'R$',d:Δ(tc>0?ts/tc:0,cc>0?cs/cc:null,true)},
    {l:'CPM Médio',v:ti>0?(ts/ti)*1000:0,fmt:'R$',d:Δ(ti>0?(ts/ti)*1000:0,ci>0?(cs/ci)*1000:null,true)},
    {l:obj.costLabel||'Custo/Resultado',v:costResult,fmt:'R$',d:Δ(costResult,cCostResult,true)},
  ];

  // ── AGRUPAMENTO DE CRIATIVOS ──
  // Usa "contém" para agrupar variantes do mesmo criativo (ex: "AD 01" agrupa "AD 01 - CÓPIA")
  const groupedCreatives=useMemo(()=>{
    const rawCr=aggBy(filteredData,'ad_name').sort((a,b)=>a.name.length-b.name.length);
    const groups=[];
    rawCr.forEach(cr=>{
      const g=groups.find(g=>cr.name.toLowerCase().includes(g.key.toLowerCase()));
      if(g){
        g.variants.push(cr.name);
        g.spend+=cr.spend;g.impressions+=cr.impressions;g.clicks+=cr.clicks;
        g.purchases+=(cr.purchases||0);g.purchase_value+=(cr.purchase_value||0);
        g.add_to_cart+=(cr.add_to_cart||0);
        filteredData.filter(r=>r.ad_name===cr.name).forEach(r=>{if(r.adset_name)g.adsets.add(r.adset_name);if(r.campaign_name)g.campaigns.add(r.campaign_name);});
      } else {
        const adsets=new Set(filteredData.filter(r=>r.ad_name===cr.name&&r.adset_name).map(r=>r.adset_name));
        const cams=new Set(filteredData.filter(r=>r.ad_name===cr.name&&r.campaign_name).map(r=>r.campaign_name));
        groups.push({key:cr.name,variants:[cr.name],spend:cr.spend,impressions:cr.impressions,clicks:cr.clicks,purchases:cr.purchases||0,purchase_value:cr.purchase_value||0,add_to_cart:cr.add_to_cart||0,adsets,campaigns:cams});
      }
    });
    return groups.map(g=>({
      ...g,
      ctr:g.impressions>0?g.clicks/g.impressions:0,
      cpc:g.clicks>0?g.spend/g.clicks:0,
      cpm:g.impressions>0?(g.spend/g.impressions)*1000:0,
      roas:g.spend>0&&g.purchase_value>0?g.purchase_value/g.spend:0,
      cpa:g.purchases>0?g.spend/g.purchases:0,
      adsetCount:g.adsets.size,
      campCount:g.campaigns.size,
      variantCount:g.variants.length,
    })).sort((a,b)=>b.spend-a.spend);
  },[filteredData]);

  const filteredGroupedCr=crFilter.trim()
    ?groupedCreatives.filter(g=>g.key.toLowerCase().includes(crFilter.toLowerCase()))
    :groupedCreatives;

  const TABS=[
    {k:'overview',l:'📊 Visão Geral'},
    {k:'campanhas',l:'📈 Campanhas'},
    {k:'conjuntos',l:'📦 Conjuntos'},
    {k:'criativos',l:'🎨 Criativos'},
  ];

  const CmpCell=({curr,prev,fmt,inv=false})=>{
    const d=Δ(curr,prev,inv);
    return<td>
      <div style={{fontSize:'12px'}}>{fmtV(curr,fmt)}</div>
      {d!==null&&<div style={{fontSize:'10px',color:d>=0?'#10b981':'#ef4444',fontWeight:'700'}}>{d>=0?'▲':'▼'} {Math.abs(d).toFixed(1)}%</div>}
    </td>;
  };

  // ── ORDENAÇÃO ──
  const toggleSort=(prev,col)=>prev.col===col?{col,dir:prev.dir==='asc'?'desc':'asc'}:{col,dir:'desc'};
  const sortArr=(arr,sort,getVal)=>[...arr].sort((a,b)=>{
    const va=getVal(a,sort.col),vb=getVal(b,sort.col);
    if(typeof va==='string')return sort.dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return sort.dir==='asc'?(va||0)-(vb||0):(vb||0)-(va||0);
  });

  const SortTh=({col,label,sort,onSort,title,cmp=false})=>{
    const active=sort.col===col;
    return<th title={title} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}} onClick={()=>onSort(col)}>
      {label}
      <span style={{marginLeft:'3px',fontSize:'9px',color:active?'#818cf8':'#374151'}}>{active?sort.dir==='asc'?'▲':'▼':'⇅'}</span>
      {cmp&&<span style={{color:'#6366f1',fontSize:'9px',marginLeft:'2px'}}>Δ%</span>}
    </th>;
  };

  const getCampVal=(c,col)=>{const res=c[obj.result||'purchases']||0;const cac=res>0?c.spend/res:0;
    if(col==='name')return c.name||'';if(col==='spend')return c.spend||0;if(col==='impressions')return c.impressions||0;
    if(col==='clicks')return c.clicks||0;if(col==='ctr')return c.ctr||0;if(col==='cpc')return c.cpc||0;
    if(col==='result')return res;if(col==='roas')return c.roas||0;if(col==='cac')return cac;if(col==='freq')return c.frequency||0;
    return c.spend||0;};
  const getAdsetVal=(a,col)=>{const res=a[obj.result||'purchases']||0;
    if(col==='name')return a.name||'';if(col==='spend')return a.spend||0;if(col==='impressions')return a.impressions||0;
    if(col==='ctr')return a.ctr||0;if(col==='cpc')return a.cpc||0;if(col==='result')return res;
    if(col==='roas')return a.roas||0;if(col==='freq')return a.frequency||0;return a.spend||0;};
  const getCrVal=(g,col)=>{
    if(col==='name')return g.key||'';if(col==='spend')return g.spend||0;if(col==='impressions')return g.impressions||0;
    if(col==='clicks')return g.clicks||0;if(col==='ctr')return g.ctr||0;if(col==='cpc')return g.cpc||0;
    if(col==='result')return g.purchases||0;if(col==='roas')return g.roas||0;if(col==='cac')return g.cpa||0;
    if(col==='variants')return g.variantCount||0;return g.spend||0;};

  // Aplicar filtro ativo + ordenação
  const sortedCamps=useMemo(()=>sortArr(activeOnly?camps.filter(c=>c.spend>0):camps,campSort,getCampVal),[camps,campSort,activeOnly,obj.result]);
  const sortedAdsets=useMemo(()=>sortArr(activeOnly?adsets.filter(a=>a.spend>0):adsets,adsetSort,getAdsetVal),[adsets,adsetSort,activeOnly,obj.result]);
  const sortedCreatives=useMemo(()=>sortArr(activeOnly?groupedCreatives.filter(g=>g.spend>0):groupedCreatives,crSort,getCrVal),[groupedCreatives,crSort,activeOnly]);

  // ── RESUMO NARRATIVO DO PERÍODO ──
  const periodSummary=useMemo(()=>{
    if(!filteredData.length)return null;
    const ts2=filteredData.reduce((s,r)=>s+(r.spend||0),0);
    const tr2=filteredData.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0);
    const metaRows=filteredData.filter(r=>r._platform==='facebook');
    const gRows=filteredData.filter(r=>r._platform==='google_ads');
    const mSpend=metaRows.reduce((s,r)=>s+(r.spend||0),0);
    const gSpend=gRows.reduce((s,r)=>s+(r.spend||0),0);
    const mResult=metaRows.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0);
    const gResult=gRows.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0);
    const cmpTs2=hasCmp?filteredCmp.reduce((s,r)=>s+(r.spend||0),0):null;
    const cmpTr2=hasCmp?filteredCmp.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0):null;
    const campsLocal=[...camps].sort((a,b)=>(b[obj.result||'purchases']||0)-(a[obj.result||'purchases']||0));
    const topC=campsLocal[0];
    const rl=obj.resultLabel||'conversões';
    let parts=[];
    if(cmpTs2!==null&&cmpTr2!==null&&cmpTr2>0){
      const rd=((tr2-cmpTr2)/cmpTr2)*100;
      const sd=((ts2-cmpTs2)/cmpTs2)*100;
      if(rd>=10)parts.push(`✅ Crescimento de ${rd.toFixed(0)}% em ${rl} vs período anterior — excelente evolução`);
      else if(rd>=-5)parts.push(`📊 ${rl.charAt(0).toUpperCase()+rl.slice(1)} estável (${rd>=0?'+':''}${rd.toFixed(1)}% vs anterior)`);
      else parts.push(`⚠️ Queda de ${Math.abs(rd).toFixed(0)}% em ${rl} vs período anterior — atenção recomendada`);
      parts.push(`Investimento ${sd>=0?`aumentou ${sd.toFixed(0)}%`:`recuou ${Math.abs(sd).toFixed(0)}%`} vs período comparado`);
    }else{
      parts.push(`📊 ${N(Math.round(tr2))} ${rl} com ${R$(ts2)} investidos no período`);
    }
    if(mSpend>0&&gSpend>0){
      const lead=mResult>=gResult?'Meta Ads':'Google Ads';
      const lv=mResult>=gResult?mResult:gResult;
      const ov=mResult>=gResult?gResult:mResult;
      parts.push(`${lead} lidera em ${rl} (${N(Math.round(lv))} vs ${N(Math.round(ov))})`);
    }else if(mSpend>0)parts.push(`Somente Meta Ads ativo — ${R$(mSpend)} investidos`);
    else if(gSpend>0)parts.push(`Somente Google Ads ativo — ${R$(gSpend)} investidos`);
    if(topC&&(topC[obj.result||'purchases']||0)>0){
      const tname=topC.name.length>45?topC.name.slice(0,45)+'…':topC.name;
      parts.push(`🏆 Melhor campanha: "${tname}" — ${N(Math.round(topC[obj.result||'purchases']||0))} ${rl} · ${R$(topC.spend)}`);
    }
    return parts.length?parts:null;
  },[filteredData,filteredCmp,hasCmp,camps,obj]);

  // Shared campaign filter bar
  const FilterBar=()=><>
    <div style={{marginBottom:'10px',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
      <button className={`btn btn-sm ${showCampPicker?'btn-primary':'btn-secondary'}`} onClick={()=>setShowCampPicker(p=>!p)}>
        {campFilter.length>0?`📊 ${campFilter.length} campanha(s)`:'📊 Filtrar campanhas'} {showCampPicker?'▲':'▼'}
      </button>
      {campFilter.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>setCampFilter([])}>✕ Limpar</button>}
      <button className={`btn btn-sm ${activeOnly?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveOnly(p=>!p)}
        title="Oculta campanhas/conjuntos/criativos sem gasto no período">
        {activeOnly?'🟢 Só com gasto':'🟢 Só ativas'}
      </button>
      <span style={{fontSize:'11px',color:'#4b5563'}}>{obj.icon} {obj.label}</span>
      {hasCmp&&<span style={{fontSize:'11px',padding:'2px 8px',background:'rgba(99,102,241,.15)',color:'#818cf8',borderRadius:'10px',border:'1px solid rgba(99,102,241,.3)'}}>📊 Comparando períodos — Δ% ao lado de cada métrica</span>}
    </div>
    {showCampPicker&&<div style={{background:'#111827',border:'1px solid #1f2937',borderRadius:'8px',padding:'10px',marginBottom:'10px',maxHeight:'200px',overflowY:'auto',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'4px'}}>

  return(<>
    <FilterBar/>

    <div style={{display:'flex',gap:'0',marginBottom:'16px',borderBottom:'1px solid #1f2937'}}>

    {/* TAB: Visão Geral */}
    {dashTab==='overview'&&<>

      <div className="kpi-grid">{kpis.map((k,i)=>{
        const isPos=k.d!=null&&k.d>=0;

    {/* TAB: Campanhas com Δ% e ordenação */}
    {dashTab==='campanhas'&&<div style={{overflowX:'auto'}}>
      <div style={{fontSize:'11px',color:'#6b7280',marginBottom:'8px'}}>
        Clique no cabeçalho para ordenar.{hasCmp&&' Δ% = variação vs período anterior. Verde = melhorou, Vermelho = piorou.'}

      </div>
      <table className="tbl">
        <thead><tr>
          <SortTh col="name" label="Campanha" sort={campSort} onSort={col=>setCampSort(p=>toggleSort(p,col))}/>

        <tbody>

              <CmpCell curr={a.impressions} prev={cmpA?.impressions} fmt='N'/>

              <CmpCell curr={res} prev={cmpRes} fmt='N'/>
              {obj.showRoas&&<td>

              </td>}
              <td style={{color:a.frequency>3.5?'#f59e0b':'#d1d5db'}}>{a.frequency?.toFixed(1)||'—'}x</td>
            </tr>;
          })}
          {!sortedAdsets.length&&<tr><td colSpan="9" style={{textAlign:'center',color:'#4b5563',padding:'28px'}}>
            {activeOnly?'Nenhum conjunto com gasto no período':'Sem dados no período'}
          </td></tr>}
        </tbody>

    </div>}

    {/* TAB: Criativos agrupados por nome base — com ordenação */}
    {dashTab==='criativos'&&<>
      <div style={{marginBottom:'10px',display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>

          <input value={crFilter} onChange={e=>setCrFilter(e.target.value)} placeholder="🔍 Buscar criativo por nome…"
            style={{width:'100%',padding:'7px 28px 7px 10px',background:'#111827',border:'1px solid #1f2937',borderRadius:'6px',color:'#f1f5f9',fontSize:'12px',outline:'none'}}/>
          {crFilter&&<button onClick={()=>setCrFilter('')} style={{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#6b7280',cursor:'pointer',fontSize:'13px',padding:0}}>✕</button>}
        </div>
        <span style={{fontSize:'11px',color:'#4b5563'}}>{(crFilter.trim()?sortedCreatives.filter(g=>g.key.toLowerCase().includes(crFilter.toLowerCase())):sortedCreatives).length} criativo(s)</span>
        <span style={{fontSize:'11px',color:'#6b7280',background:'#111827',border:'1px solid #1f2937',borderRadius:'6px',padding:'4px 8px'}}>
          💡 Clique no cabeçalho para ordenar · Criativos com mesmo nome base são somados
        </span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="tbl">
          <thead><tr>
            <SortTh col="name" label="Criativo (nome base)" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            <SortTh col="variants" label="Var." sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))} title="Variantes agrupadas"/>
            <th title="Conjuntos onde aparece">Conj.</th>

            <SortTh col="spend" label="Gasto" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            <SortTh col="impressions" label="Impressões" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>

            <SortTh col="ctr" label="CTR" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            <SortTh col="cpc" label="CPC" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            <SortTh col="result" label={obj.resultLabel||'Result.'} sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            {obj.showRoas&&<SortTh col="roas" label="ROAS" sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>}
            <SortTh col="cac" label={obj.costLabel||'CAC'} sort={crSort} onSort={col=>setCrSort(p=>toggleSort(p,col))}/>
            <th>Link</th>
          </tr></thead>

            {(crFilter.trim()?sortedCreatives.filter(g=>g.key.toLowerCase().includes(crFilter.toLowerCase())):sortedCreatives).map((g,i)=>(
              <tr key={i}>

                </td>

                <td style={{color:g.ctr<0.005?'#ef4444':g.ctr>0.015?'#10b981':'#d1d5db'}}>{Pct(g.ctr)}</td>

                <td>{g.cpa>0?R$(g.cpa):'—'}</td>

};

// ── SMART INSIGHTS PAGE v2 (4 abas) ──
const InsightsCampanhasPage=({allData,dateFrom,dateTo,objConfig={}})=>{
  const [tab,setTab]=useState('gargalos');
  const obj=objConfig;
  const camps=useMemo(()=>aggBy(allData,'campaign_name'),[allData]);
  const adsets=useMemo(()=>aggBy(allData,'adset_name'),[allData]);
  const creatives=useMemo(()=>aggBy(allData,'ad_name'),[allData]);
  const mid=midDate(dateFrom,dateTo);

  // Funil global
  const ts=allData.reduce((s,r)=>s+(r.spend||0),0);
  const ti=allData.reduce((s,r)=>s+(r.impressions||0),0);
  const tc=allData.reduce((s,r)=>s+(r.clicks||0),0);
  const ta=allData.reduce((s,r)=>s+(r.add_to_cart||0),0);
  const tChk=allData.reduce((s,r)=>s+(r.initiate_checkout||0),0);
  const tResult=allData.reduce((s,r)=>s+(r[obj.result||'purchases']||0),0);
  const tv=allData.reduce((s,r)=>s+(r.purchase_value||0),0);

  // Médias para comparação
  const avgCampCtr=camps.length?camps.reduce((s,c)=>s+(c.ctr||0),0)/camps.length:0;
  const avgCampRoas=camps.filter(c=>c.roas>0).length?camps.filter(c=>c.roas>0).reduce((s,c)=>s+c.roas,0)/camps.filter(c=>c.roas>0).length:0;

  // Tendência por campanha (primeira vs segunda metade)
  const campTrends=useMemo(()=>{
    const map={};
    camps.forEach(camp=>{
      const cd=allData.filter(r=>r.campaign_name===camp.name);
      const h1=cd.filter(r=>r.date<mid),h2=cd.filter(r=>r.date>=mid);
      const avg=(arr,f)=>arr.length?arr.reduce((s,r)=>s+(r[f]||0),0)/arr.length:0;
      const ctrA=avg(h1,'ctr'),ctrB=avg(h2,'ctr');
      const cpcA=avg(h1,'cpc'),cpcB=avg(h2,'cpc');
      map[camp.name]={
        ctrDelta:ctrA>0?(ctrB-ctrA)/ctrA:0,
        cpcDelta:cpcA>0?(cpcB-cpcA)/cpcA:0,
        hasTrend:h1.length>0&&h2.length>0
      };
    });
    return map;
  },[camps,allData,mid]);

  // ── ABA 1: GARGALOS ──
  const gargalos=useMemo(()=>{
    const items=[];
    // Funil macro
    if(ti>0&&tc>0){
      const cartRate=tc>0?(ta/tc)*100:0;
      const chkRate=ta>0?(tChk/ta)*100:0;
      const convRate=tChk>0?(tResult/tChk)*100:0;
      if(cartRate>0&&cartRate<5)items.push({level:'critical',icon:'🔴',scope:'Funil Geral',title:'Gargalo: clique → carrinho (<5%)',
        msg:`Apenas ${cartRate.toFixed(1)}% dos cliques resultam em carrinho. O anúncio atrai mas a landing page não converte. Revisar velocidade, headline, oferta e CTA acima da dobra.`,
        actions:['Auditar velocidade da LP (PageSpeed)','Testar headline diferente','Adicionar prova social (avaliações, selos)','Testar botão de CTA com outra cor e copy']});
      if(chkRate>0&&chkRate<35)items.push({level:'warning',icon:'🟡',scope:'Funil Geral',title:`Abandono de carrinho: ${chkRate.toFixed(0)}% vão ao checkout`,
        msg:`${(100-chkRate).toFixed(0)}% abandonam o carrinho sem iniciar checkout. Causas: frete surpresa, necessidade de criar conta, preço assusta.`,
        actions:['Mostrar frete antes do checkout','Ativar notificação de abandono','Oferecer cupom de recuperação','Permitir checkout como convidado']});
      if(convRate>0&&convRate<20)items.push({level:'warning',icon:'🟡',scope:'Funil Geral',title:`Checkout → Compra: apenas ${convRate.toFixed(0)}%`,
        msg:`De cada 100 checkouts iniciados, apenas ${convRate.toFixed(0)} viram compra. Problema de confiança ou processo complexo.`,
        actions:['Adicionar selos SSL e logos de pagamento','Reduzir campos obrigatórios','Testar checkout em 1 página','Verificar erros técnicos no checkout']});
    }
    // Por campanha
    camps.forEach(camp=>{
      const t=campTrends[camp.name];
      if(t?.hasTrend){
        if(t.ctrDelta<-0.30&&t.cpcDelta>0.20)items.push({level:'critical',icon:'🔴',scope:camp.name,title:'Fadiga de criativo/público detectada',
          msg:`CTR caiu ${Math.abs((t.ctrDelta*100).toFixed(0))}% e CPC subiu ${(t.cpcDelta*100).toFixed(0)}% na 2ª metade do período. Público saturado ou criativo com desgaste.`,
          actions:['Pausar criativos com frequência >3.5x','Subir novo criativo com ângulo diferente','Expandir ou trocar público-alvo','Testar novo formato (vídeo se usava imagem)']});
        else if(t.ctrDelta<-0.20)items.push({level:'warning',icon:'🟡',scope:camp.name,title:`CTR em queda (${(t.ctrDelta*100).toFixed(0)}% na 2ª metade)`,
          msg:`Sinal de fadiga de criativo ou saturação. Monitorar frequência e CPC nos próximos dias.`,
          actions:['Verificar frequência por conjunto','Preparar variação do criativo','Monitorar diariamente']});
      }
      const res=camp[obj.result||'purchases']||0;
      const cac=res>0?camp.spend/res:0;
      if(cac>300&&res>0)items.push({level:'critical',icon:'🔴',scope:camp.name,title:`CAC crítico: ${R$(cac)} por ${obj.resultLabel||'resultado'}`,
        msg:`Custo por resultado muito acima do aceitável. Esta campanha está consumindo verba sem retorno proporcional.`,
        actions:['Pausar conjuntos com maior CAC','Revisar oferta (preço, frete, bônus)','Testar criativo com foco no benefício principal','Realocar verba para campanha com melhor ROAS']});
      if(camp.frequency>3.5&&camp.spend>100)items.push({level:'warning',icon:'🟡',scope:camp.name,title:`Saturação de público: frequência ${camp.frequency.toFixed(1)}x`,
        msg:`Acima de 3.5x a audiência está vendo o mesmo anúncio repetidamente — CTR cai e CPM sobe. Renovar público ou criativo.`,
        actions:['Expandir tamanho do público','Excluir compradores recentes','Testar novo criativo com ângulo diferente','Criar conjunto com público LAL 2-3%']});
    });
    // Criativos sem conversão com gasto alto
    creatives.forEach(cr=>{
      if(cr.spend>300&&(cr[obj.result||'purchases']||0)===0&&allData.some(r=>(r[obj.result||'purchases']||0)>0))
        items.push({level:'warning',icon:'🟡',scope:`Criativo: ${cr.name.slice(0,35)}`,title:`Criativo queimando verba sem ${obj.resultLabel||'resultado'}`,
          msg:`Gastou ${R$(cr.spend)} sem gerar ${obj.resultLabel||'resultados'}. ${cr.ctr>0.01?'CTR ok — problema está na LP ou oferta.':'CTR baixo — problema no próprio anúncio.'}`,
          actions:['Pausar este criativo','Verificar se o problema é CTR ou pós-clique','Testar variação com copy/visual diferente']});
    });
    return items;
  },[camps,creatives,campTrends,allData,ti,tc,ta,tChk,tResult,obj]);

  // ── ABA 2: ESTRATÉGIAS & TESTES ──
  const estrategias=useMemo(()=>{
    const items=[];
    const topCreatives=creatives.filter(c=>c.ctr>avgCampCtr*1.3&&c.spend>100).sort((a,b)=>b.ctr-a.ctr);
    const weakCamps=camps.filter(c=>(obj.showRoas?c.roas<avgCampRoas*0.7:c.ctr<avgCampCtr*0.7)&&c.spend>100);
    // Criativo vencedor não testado em outras campanhas
    topCreatives.slice(0,3).forEach(cr=>{
      const campsWithCr=[...new Set(allData.filter(r=>r.ad_name===cr.name).map(r=>r.campaign_name))];
      const campsWithout=weakCamps.filter(c=>!campsWithCr.includes(c.name));
      if(campsWithout.length>0)items.push({level:'scale',icon:'🧪',scope:'Teste de Criativo',
        title:`Aplicar criativo top em campanhas com baixa performance`,
        msg:`O criativo "${cr.name.slice(0,35)}" tem CTR ${Pct(cr.ctr)} (acima da média) e ainda não foi testado em: ${campsWithout.slice(0,2).map(c=>'"'+c.name.slice(0,22)+'"').join(', ')}. Criativos validados em novas campanhas reduzem risco de teste.`,
        actions:['Duplicar criativo para as campanhas listadas','Manter público e landing page iguais','Comparar CTR e conversão por 5-7 dias']});
    });
    // Campanha com CTR bom mas conversão baixa → problema de LP
    camps.forEach(camp=>{
      const res=camp[obj.result||'purchases']||0;
      if(camp.ctr>avgCampCtr*1.2&&res===0&&camp.clicks>50&&camp.spend>100)
        items.push({level:'info',icon:'🔗',scope:camp.name,title:'CTR bom, sem conversão → testar outro destino',
          msg:`CTR de ${Pct(camp.ctr)} acima da média, mas zero ${obj.resultLabel||'resultados'}. O problema não é o anúncio — é o destino. Testar outra LP ou ângulo de oferta.`,
          actions:['Testar LP com headline diferente','Enviar para página de produto vs LP dedicada','Verificar velocidade (PageSpeed Insights)','Testar página com vídeo de apresentação']});
    });
    // Sugestão de conjuntos com mesmo criativo vencedor
    const bestAdset=adsets.sort((a,b)=>b.roas-a.roas)[0];
    const worstAdsets=adsets.filter(a=>a.roas>0&&a.roas<avgCampRoas*0.5&&a.spend>100).slice(0,2);
    if(bestAdset&&worstAdsets.length>0)items.push({level:'info',icon:'📦',scope:'Conjuntos',
      title:`Testar público do conjunto top nos conjuntos fracos`,
      msg:`O conjunto "${bestAdset.name.slice(0,30)}" tem ROAS ${bestAdset.roas.toFixed(1)}x. Os conjuntos com ROAS abaixo da metade da média (${worstAdsets.map(a=>'"'+a.name.slice(0,20)+'"').join(', ')}) poderiam ser reformulados com a segmentação do melhor conjunto.`,
      actions:['Duplicar o conjunto top com novo criativo','Pausar conjuntos com ROAS <50% da média','Testar o mesmo público em outra campanha']});
    // LAL de compradores
    if(tResult>15)items.push({level:'scale',icon:'👥',scope:'Públicos — Lookalike',
      title:`Criar LAL baseado em ${N(tResult)} compradores do período`,
      msg:`Com ${N(tResult)} ${obj.resultLabel||'resultados'}, é possível criar Lookalike 1%, 2% e 3% dos compradores. Esse público costuma ter CAC 30-50% menor que público frio por interesse.`,
      actions:['Exportar lista de compradores do período','Criar LAL 1% e 2% no Gerenciador','Testar com o criativo de melhor CTR','Orçamento inicial: 20% do gasto atual']});
    // Público aberto
    items.push({level:'info',icon:'🌐',scope:'Públicos — Topo de Funil',
      title:'Testar público aberto (sem interesse definido)',
      msg:`Campanhas sem segmentação por interesse deixam o algoritmo encontrar compradores organicamente. CPM costuma ser 20-40% menor. Indicado para criativos já validados.`,
      actions:['Criar conjunto com público aberto (18-65, Brasil)','Ativar Advantage+ Audience','Usar o criativo de melhor CTR atual','Orçamento de teste: 30% do gasto total']});
    // Segmentação por gênero/faixa etária
    if(camps.some(c=>c.spend>300))items.push({level:'info',icon:'🎯',scope:'Segmentação Demográfica',
      title:'Testar segmentação por gênero e faixa etária separados',
      msg:`Com público amplo, criar conjuntos separados por gênero (M/F) e faixa etária (18-34 / 35-54) revela qual segmento tem melhor CAC — e concentra verba onde é mais eficiente.`,
      actions:['Criar conjunto: feminino 25-44','Criar conjunto: masculino 25-44','Comparar CAC por segmento após 7 dias','Concentrar 70% da verba no melhor segmento']});
    // Reels/Stories
    items.push({level:'info',icon:'📱',scope:'Posicionamento',
      title:'Testar Reels isolado (CPM menor, alcance maior)',
      msg:`Reels costumam ter CPM 25-40% menor que feed. Vale criar um conjunto exclusivo para Reels com criativo vertical 9:16 de 15-30s.`,
      actions:['Criar conjunto exclusivo para Reels','Adaptar criativo para vertical 9:16','Comparar CPM e CTR vs posicionamento automático']});
    return items;
  },[camps,adsets,creatives,allData,avgCampCtr,avgCampRoas,tResult,obj]);

  // ── ABA 3: OPORTUNIDADES DE ESCALA ──
  const escala=useMemo(()=>{
    const items=[];
    camps.forEach(camp=>{
      const t=campTrends[camp.name];
      const stable=!t?.hasTrend||t.ctrDelta>-0.10;
      const goodRoas=obj.showRoas?camp.roas>=3.5:true;
      const goodCtr=camp.ctr>=0.009;
      if(!goodCtr||!stable||!goodRoas||camp.spend<80)return;
      // Detecta conjuntos desta campanha
      const campAdsets=adsets.filter(a=>allData.some(r=>r.campaign_name===camp.name&&r.adset_name===a.name));
      const isCBO=campAdsets.length>=3;
      const isABO=campAdsets.length>=2&&!isCBO;
      const topAdset=campAdsets.sort((a,b)=>b.roas-a.roas)[0];
      const inc=Math.round(camp.spend*0.30/10)*10;
      items.push({level:'scale',icon:'🚀',scope:camp.name,
        title:`Escalar — ${obj.showRoas?`ROAS ${camp.roas.toFixed(1)}x · `:''}CTR ${Pct(camp.ctr)} · ${campAdsets.length} conj.`,
        msg:`Performance estável, boa eficiência. ${isCBO?`Estrutura CBO detectada (${campAdsets.length} conjuntos). Aumente orçamento na campanha e defina limite mínimo no melhor conjunto.`
          :isABO?`Estrutura ABO detectada (${campAdsets.length} conjuntos). Aumente o orçamento individualmente nos conjuntos que performam.`
          :`Campanha com ${campAdsets.length} conjunto. Aumente o orçamento direto no conjunto.`}`,
        budgetTip:isCBO
          ?[`↑ Aumentar budget da campanha em +R$${inc}/dia`,
            `Definir limite mínimo de R$${Math.round(topAdset?.spend*0.4/5)*5||20}/dia para "${topAdset?.name?.slice(0,25)||'melhor conjunto'}"`,
            'Aumentar no máximo 30% a cada 3-4 dias']
          :[`↑ Aumentar budget do(s) conjunto(s) top em +R$${Math.round(inc/campAdsets.length/5)*5||10}/dia cada`,
            'Aumentar no máximo 30% a cada 3-4 dias',
            'Duplicar conjunto top para novo público em paralelo'],
        actions:[]
      });
    });
    // Conjuntos sub-investidos com ROAS acima da média
    adsets.forEach(a=>{
      const parentCamp=camps.find(c=>allData.some(r=>r.campaign_name===c.name&&r.adset_name===a.name));
      if(!parentCamp)return;
      if(a.roas>avgCampRoas*1.5&&a.spend<parentCamp.spend*0.20&&a.spend>50&&parentCamp.spend>200){
        items.push({level:'scale',icon:'💎',scope:`Conjunto: ${a.name.slice(0,35)}`,
          title:`Conjunto sub-investido com ROAS ${a.roas.toFixed(1)}x (acima da média)`,
          msg:`Este conjunto recebe apenas ${((a.spend/parentCamp.spend)*100).toFixed(0)}% do orçamento da campanha mas tem ROAS ${a.roas.toFixed(1)}x — muito acima da média. Em campanha CBO: defina limite mínimo de gasto. Em ABO: aumente orçamento deste conjunto específico.`,
          budgetTip:[
            `CBO → Definir limite mínimo: R$${Math.round(a.spend*0.5/5)*5}/dia neste conjunto`,
            `ABO → Aumentar orçamento deste conjunto +30%`,
            'Não alterar criativos durante a escala'],
          actions:[]});
      }
    });
    return items;
  },[camps,adsets,allData,campTrends,avgCampRoas,obj]);

  // ── ABA 4: AÇÕES ──
  const acoes=useMemo(()=>[
    ...gargalos.filter(g=>g.level==='critical').map(g=>({p:1,icon:'🔴',tipo:'Pausar / Corrigir',scope:g.scope,title:g.title,actions:g.actions})),
    ...gargalos.filter(g=>g.level==='warning').map(g=>({p:2,icon:'🟡',tipo:'Otimizar',scope:g.scope,title:g.title,actions:g.actions})),
    ...escala.map(e=>({p:3,icon:'🚀',tipo:'Escalar',scope:e.scope,title:e.title,actions:e.budgetTip||e.actions})),
    ...estrategias.filter(e=>e.level==='scale').map(e=>({p:4,icon:'🧪',tipo:'Testar (urgente)',scope:e.scope,title:e.title,actions:e.actions})),
    ...estrategias.filter(e=>e.level==='info').map(e=>({p:5,icon:'💡',tipo:'Testar',scope:e.scope,title:e.title,actions:e.actions})),
  ].sort((a,b)=>a.p-b.p),[gargalos,escala,estrategias]);

  const TABS=[
    {k:'gargalos',l:'🔍 Gargalos',count:gargalos.length,c:'#ef4444',rgb:'239,68,68'},
    {k:'estrategias',l:'🧪 Estratégias & Testes',count:estrategias.length,c:'#6366f1',rgb:'99,102,241'},
    {k:'escala',l:'🚀 Escala',count:escala.length,c:'#10b981',rgb:'16,185,129'},
    {k:'acoes',l:'✅ Ações',count:acoes.length,c:'#f59e0b',rgb:'245,158,11'},
  ];

  const InsCard=({item})=>{
    const cls={critical:'insight-critical',warning:'insight-warning',scale:'insight-scale',info:'insight-info'}[item.level]||'insight-info';
    return<div className={`insight-card ${cls}`}>
      <div className="insight-icon">{item.icon}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:'11px',color:'#6b7280',marginBottom:'2px'}}>{item.scope}</div>
        <div className="insight-title">{item.title}</div>
        <div className="insight-msg">{item.msg}</div>
        {item.budgetTip&&<div style={{marginTop:'8px',padding:'8px 10px',background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:'6px'}}>
          <div style={{fontSize:'10px',color:'#6b7280',marginBottom:'4px',fontWeight:'700',textTransform:'uppercase'}}>💰 Ação de Orçamento</div>
          {item.budgetTip.map((t,i)=><div key={i} style={{fontSize:'11px',color:'#34d399',marginBottom:'2px'}}>→ {t}</div>)}
        </div>}
        <div className="insight-actions">{(item.actions||[]).map((a,i)=><span key={i} className="insight-action-tag">→ {a}</span>)}</div>
      </div>
    </div>;
  };

  return(<>
    <h2>Insights de Campanhas</h2>
    {/* Tabs */}
    <div style={{display:'flex',gap:'6px',marginBottom:'20px',flexWrap:'wrap'}}>
      {TABS.map(t=>(
        <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:'8px 14px',border:`1px solid ${tab===t.k?t.c:'#1f2937'}`,borderRadius:'8px',
          background:tab===t.k?`rgba(${t.rgb},.12)`:'#111827',color:tab===t.k?t.c:'#9ca3af',
          fontSize:'13px',fontWeight:'600',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',transition:'all .15s'}}>
          {t.l}
          {t.count>0&&<span style={{background:tab===t.k?t.c:'#374151',color:'#fff',borderRadius:'10px',padding:'0 6px',fontSize:'10px',fontWeight:'700'}}>{t.count}</span>}
        </button>
      ))}
    </div>

    {/* TAB: Gargalos */}
    {tab==='gargalos'&&<>
      {/* Funil visual */}
      {ti>0&&<div className="card" style={{marginBottom:'16px'}}>
        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'10px',textTransform:'uppercase',letterSpacing:'.05em'}}>FUNIL DO PERÍODO</div>
        <div style={{display:'flex',alignItems:'stretch',gap:'3px',flexWrap:'wrap'}}>
          {[
            {l:'Impressões',v:N(ti),pct:null,c:'#6366f1'},
            {l:'Cliques',v:N(tc),pct:ti>0?((tc/ti)*100).toFixed(2)+'%':null,c:'#8b5cf6',ok:ti>0&&(tc/ti)>0.005},
            {l:'Carrinho',v:N(ta),pct:tc>0?((ta/tc)*100).toFixed(1)+'%':null,c:'#f59e0b',ok:tc>0&&(ta/tc)>0.05},
            {l:'Checkout',v:N(tChk),pct:ta>0?((tChk/ta)*100).toFixed(1)+'%':null,c:'#ef4444',ok:ta>0&&(tChk/ta)>0.35},
            {l:obj.resultLabel||'Compras',v:N(tResult),pct:tChk>0?((tResult/tChk)*100).toFixed(1)+'%':null,c:'#10b981',ok:tChk>0&&(tResult/tChk)>0.20},
          ].map((step,i,arr)=>(
            <React.Fragment key={step.l}>
              <div style={{textAlign:'center',flex:1,minWidth:'70px',padding:'8px 4px',background:'rgba(255,255,255,.03)',borderRadius:'6px',border:`1px solid ${step.pct&&step.ok===false?'rgba(239,68,68,.3)':'rgba(255,255,255,.05)'}`}}>
                <div style={{fontSize:'10px',color:'#6b7280',marginBottom:'4px'}}>{step.l}</div>
                <div style={{fontSize:'17px',fontWeight:'700',color:step.c}}>{step.v}</div>
                {step.pct&&<div style={{fontSize:'10px',marginTop:'3px',fontWeight:'600',color:step.ok===false?'#ef4444':'#10b981'}}>{step.pct}</div>}
              </div>
              {i<arr.length-1&&<div style={{color:'#374151',fontSize:'16px',alignSelf:'center',paddingTop:'4px'}}>›</div>}
            </React.Fragment>
          ))}
        </div>
      </div>}
      {!gargalos.length?<div className="card" style={{textAlign:'center',padding:'24px',color:'#6b7280'}}>✅ Nenhum gargalo crítico identificado. Boa performance!</div>
        :gargalos.map((item,i)=><InsCard key={i} item={item}/>)}
    </>}

    {/* TAB: Estratégias */}
    {tab==='estrategias'&&<>
      {!estrategias.length?<div className="card" style={{textAlign:'center',padding:'24px',color:'#6b7280'}}>Sem dados suficientes para sugestões estratégicas.</div>
        :estrategias.map((item,i)=><InsCard key={i} item={item}/>)}
    </>}

    {/* TAB: Escala */}
    {tab==='escala'&&<>
      {!escala.length?<div className="card" style={{textAlign:'center',padding:'24px',color:'#6b7280'}}>Nenhuma campanha com performance suficiente para escala identificada.</div>
        :escala.map((item,i)=><InsCard key={i} item={item}/>)}
    </>}

    {/* TAB: Ações */}
    {tab==='acoes'&&<>
      {!acoes.length?<div className="card" style={{textAlign:'center',padding:'24px',color:'#6b7280'}}>Nenhuma ação pendente identificada.</div>
        :<><div style={{fontSize:'12px',color:'#6b7280',marginBottom:'12px'}}>Prioridade 1 = mais urgente. Execute na ordem sempre que possível.</div>
        {acoes.map((item,i)=>(
          <div key={i} style={{background:'#111827',border:'1px solid #1f2937',borderRadius:'8px',padding:'14px 16px',marginBottom:'8px',display:'flex',gap:'12px',alignItems:'flex-start'}}>
            <div style={{fontSize:'20px',lineHeight:1,marginTop:'1px'}}>{item.icon}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}}>
                <span style={{background:'#1f2937',color:'#9ca3af',borderRadius:'10px',padding:'1px 7px',fontSize:'10px',fontWeight:'700'}}>#{i+1}</span>
                <span style={{fontSize:'10px',padding:'1px 6px',background:'rgba(255,255,255,.05)',borderRadius:'4px',color:'#6b7280'}}>{item.tipo}</span>
                <span style={{fontSize:'11px',color:'#6b7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'200px'}}>{item.scope}</span>
              </div>
              <div style={{fontSize:'13px',fontWeight:'700',color:'#f1f5f9',marginBottom:'6px'}}>{item.title}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                {(item.actions||[]).map((a,j)=><span key={j} style={{padding:'3px 8px',background:'#1f2937',borderRadius:'4px',fontSize:'11px',color:'#d1d5db'}}>→ {a}</span>)}
              </div>
            </div>
          </div>
        ))}</>}
    </>}
  </>);
};

// ── CRIATIVOS PAGE ──
const CriativosPage=({allData,anthropicKey,objConfig={}})=>{
  const [filter,setFilter]=useState('');
  const [metric,setMetric]=useState('spend');
  const [gran,setGran]=useState('daily');
  const [sel,setSel]=useState([]);
  const [focused,setFocused]=useState(null); // item com detalhes abertos
  const [aiRes,setAiRes]=useState('');
  const [aiLoad,setAiLoad]=useState(false);
  const [itemAiRes,setItemAiRes]=useState({});
  const [itemAiLoad,setItemAiLoad]=useState(false);
  const [showActive,setShowActive]=useState(false);

  const activeSet=useMemo(()=>getActiveSet(allData,'ad_name'),[allData]);
  const allCreatives=aggBy(allData,'ad_name');
  const creatives=showActive?allCreatives.filter(c=>activeSet.has(c.name)):allCreatives;
  const filtered=creatives.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()));
  const chartData=timeSeries(allData,'ad_name',sel,gran,metric);
  const avgCtr=allCreatives.length?allCreatives.reduce((s,c)=>s+(c.ctr||0),0)/allCreatives.length:0;
  const avgRoas=allCreatives.filter(c=>c.roas>0).reduce((s,c)=>s+(c.roas||0),0)/Math.max(1,allCreatives.filter(c=>c.roas>0).length);

  const METRICS=[
    ['spend','Gasto'],['impressions','Impressões'],['clicks','Cliques'],['ctr','CTR'],
    ['cpm','CPM'],['cpc','CPC'],['frequency','Frequência'],
    ['purchases','Compras'],['purchase_value','Receita (R$)'],['add_to_cart','Carrinho'],
    ['cost_per_purchase','Custo/Compra'],['roas','ROAS'],
    ['messaging_conversations','Conversas'],['custom_event','Evento Personalizado'],
  ];

  const fmtM=(c,m)=>{
    switch(m){
      case'spend':return R$(c.spend);case'impressions':return N(c.impressions);case'clicks':return N(c.clicks);
      case'ctr':return Pct(c.ctr);case'cpm':return R$(c.cpm);case'cpc':return R$(c.cpc);
      case'frequency':return c.frequency.toFixed(1)+'x';case'purchases':return N(c.purchases);
      case'purchase_value':return R$(c.purchase_value);case'add_to_cart':return N(c.add_to_cart);
      case'cost_per_purchase':return c.cost_per_purchase>0?R$(c.cost_per_purchase):'—';
      case'roas':return c.roas>0?c.roas.toFixed(1)+'x':'—';
      case'messaging_conversations':return N(c.messaging_conversations);
      default:return'—';
    }
  };

  // Trend: compara primeira metade vs segunda metade do período
  const getTrend=(name)=>{
    const rows=allData.filter(r=>r.ad_name===name).sort((a,b)=>a.date>b.date?1:-1);
    if(rows.length<4)return null;
    const mid=Math.floor(rows.length/2);
    const h1=rows.slice(0,mid).reduce((s,r)=>s+(r.spend||0),0);
    const h2=rows.slice(mid).reduce((s,r)=>s+(r.spend||0),0);
    const ctr1=rows.slice(0,mid).reduce((s,r)=>s+(r.ctr||0),0)/mid;
    const ctr2=rows.slice(mid).reduce((s,r)=>s+(r.ctr||0),0)/(rows.length-mid);
    return{spendDelta:h1>0?(h2-h1)/h1:0,ctrDelta:ctr1>0?(ctr2-ctr1)/ctr1:0};
  };

  const toggle=n=>{
    setSel(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
    setFocused(n);
  };

  // Análise IA de um criativo específico
  const analyzeItem=async(c)=>{
    if(!anthropicKey){setItemAiRes(p=>({...p,[c.name]:'⚠️ Configure a Anthropic API Key em Configurações.'}));return;}
    setItemAiLoad(true);
    try{
      const trend=getTrend(c.name);
      const objLabel=objConfig.label||'E-commerce';
      const resultLabel=objConfig.resultLabel||'Compras';
      const resultVal=c[objConfig.result||'purchases']||0;
      const costVal=c[objConfig.costResult||'cost_per_purchase']||0;
      const prompt=`Analise este criativo de anúncio (objetivo: ${objLabel}) em português. Seja direto e prático, máximo 6 linhas.

CRIATIVO: ${c.name}
Investimento: ${R$(c.spend)} | ${resultLabel}: ${resultVal} | ${objConfig.valueLabel?`Receita: ${R$(c[objConfig.valueField||'purchase_value']||0)} |`:''}
${objConfig.showRoas?`ROAS: ${c.roas>0?c.roas.toFixed(2)+'x':'N/A'} |`:''}Custo/${resultLabel}: ${costVal>0?R$(costVal):'N/A'}
CTR: ${Pct(c.ctr)} (média: ${Pct(avgCtr)}) | Frequência: ${c.frequency.toFixed(1)}x
${funnelData?`Funil: ${funnelData.steps.map(s=>`${s.l}:${Math.round(s.v||0)}`).join('→')}
${funnelData.bottleneck?.v>0?`Gargalo: ${funnelData.bottleneck.prevLabel}→${funnelData.bottleneck.l} (${(funnelData.bottleneck.rate*100).toFixed(0)}%)`:''}`:''}
Tendência CTR: ${trend?((trend.ctrDelta*100).toFixed(0)+'% vs 1ª metade'):'dados insuficientes'}

Responda assim:
🎯 Hook: [bom/fraco - CTR vs média]
🔁 Fadiga: [sim/não - freq e tendência]
📊 Funil: [qual etapa está perdendo mais? o que otimizar?]
📈 Tendência: [melhorando/estável/piorando]
💡 Ação: [escalar/manter/pausar/substituir + motivo específico]`;
      const res=await callClaude(anthropicKey,prompt,400);
      setItemAiRes(p=>({...p,[c.name]:res}));
    }catch(e){setItemAiRes(p=>({...p,[c.name]:'Erro: '+e.message}));}
    setItemAiLoad(false);
  };

  // Análise geral de todos criativos
  const analyzeAll=async()=>{
    if(!anthropicKey){setAiRes('⚠️ Configure a Anthropic API Key em Configurações.');return;}
    setAiLoad(true);setAiRes('');
    try{
      const top=filtered.slice(0,12).map(c=>`${c.name}: R$${c.spend.toFixed(0)}, CTR ${Pct(c.ctr)}, Freq ${c.frequency.toFixed(1)}x, Compras ${c.purchases||0}, ROAS ${c.roas>0?c.roas.toFixed(1)+'x':'N/A'}`).join('\n');
      const prompt=`Analise ${filtered.length} criativos de anúncios. Top criativos:\n${top}\n\nResponda em português com:\n1. Melhores criativos (top 3 e por quê)\n2. Criativos com fadiga (frequência alta ou CTR caindo)\n3. Padrões identificados nos hooks/formatos\n4. Recomendações de ação imediata`;
      const res=await callClaude(anthropicKey,prompt,1200);
      setAiRes(res);
    }catch(e){setAiRes('Erro: '+e.message);}
    setAiLoad(false);
  };

  const focusedCreative=focused?allCreatives.find(c=>c.name===focused):null;

  // Funnel analysis for focused creative
  const getFunnelAnalysis=(c)=>{
    if(!c)return null;
    const steps=objConfig.funnel||[];
    const vals=steps.map(s=>({...s,v:c[s.f]||0}));
    const bottleneck=vals.reduce((worst,cur,i)=>{
      if(i===0)return worst;
      const prev=vals[i-1];
      const rate=prev.v>0?cur.v/prev.v:0;
      return(!worst||rate<worst.rate)?{...cur,rate,prevLabel:prev.l}:worst;
    },null);
    return{steps:vals,bottleneck};
  };
  const funnelData=getFunnelAnalysis(focusedCreative);

        {focusedCreative&&(

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
              <div>
                <div style={{fontWeight:'700',fontSize:'13px',marginBottom:'2px'}}>{focusedCreative.name}</div>

              <div style={{marginBottom:'8px'}}>
                <div style={{fontSize:'10px',color:'#4b5563',textTransform:'uppercase',marginBottom:'4px'}}>📊 Funil</div>
                <div style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>
                  {funnelData.steps.map((s,i)=>(
                    <React.Fragment key={s.f}>
                      {i>0&&<span style={{color:'#374151',fontSize:'10px'}}>→</span>}

const CerebroPage=({allData,anthropicKey,objConfig={},dateFrom,dateTo})=>{
  const [res,setRes]=useState('');const [load,setLoad]=useState(false);const [section,setSection]=useState('geral');
  const camps=aggBy(allData,'campaign_name');
  const adsets=aggBy(allData,'adset_name');
  const ts=allData.reduce((s,r)=>s+(r.spend||0),0);
  const tv=allData.reduce((s,r)=>s+(r.purchase_value||0),0);
  const ti=allData.reduce((s,r)=>s+(r.impressions||0),0);
  const tc=allData.reduce((s,r)=>s+(r.clicks||0),0);
  const tResult=allData.reduce((s,r)=>s+(r[objConfig.result||'purchases']||0),0);
  const ta=allData.reduce((s,r)=>s+(r.add_to_cart||0),0);
  const tChk=allData.reduce((s,r)=>s+(r.initiate_checkout||0),0);
  const roas=ts>0&&tv>0?tv/ts:0;
  const ctr=ti>0?(tc/ti)*100:0;
  const cpc=tc>0?ts/tc:0;

  // Roda os insights automáticos para incluir no contexto do Claude
  const autoInsights=useMemo(()=>generateInsights(allData,dateFrom,dateTo),[allData,dateFrom,dateTo]);
  const totalAutoAlerts=autoInsights.critical.length+autoInsights.warning.length+autoInsights.scale.length+autoInsights.info.length;

  const buildPrompt=(sec)=>{
    const campStr=camps.slice(0,12).map(c=>{

    }).join('\n');
    const adsetStr=adsets.slice(0,8).map(a=>`• ${a.name}: R$${a.spend.toFixed(0)}, CTR=${Pct(a.ctr)}, ${objConfig.resultLabel}=${a[objConfig.result||'purchases']||0}`).join('\n');

ALERTAS DETECTADOS AUTOMATICAMENTE (${totalAutoAlerts} alertas):

PERÍODO: ${dateFrom} a ${dateTo}
OBJETIVO: ${objConfig.label||'E-commerce'}

- Total investido: ${R$(ts)}
- ${objConfig.resultLabel||'Compras'}: ${N(tResult)}
${objConfig.showRoas?`- ROAS: ${roas.toFixed(2)}x`:''}

${objConfig.valueField?`- Receita total: ${R$(tv)}`:''}

FUNIL COMPLETO:
${funnelStr}

CAMPANHAS (por gasto):
${campStr}

CONJUNTOS (top 8):
${adsetStr}

${alertsSection}

BENCHMARKS DO FRAMEWORK:
- CTR: ≥1.5% excelente, 1-1.5% bom, <0.7% fraco → trocar criativo
- ROAS: ≥5x escalar, 3-5x manter, <2x revisar, <1x pausar
- Frequência: <2 ok, 2-3 atenção, >3.5 saturado → renovar público
- Funil: Cart/Click <5% = problema de produto/preço; Checkout/Cart <35% = abandono; Compra/Checkout <20% = problema de confiança
- Estrutura ideal: 70% público frio (topo), 30% quente (remarketing/LAL)
- ABO para testes, CBO para escala
`;

    if(sec==='geral')return base+`
Faça uma análise estratégica COMPLETA em português. Seja direto, use os nomes reais das campanhas e cite números:

1. 🏆 MELHORES CAMPANHAS — Quais estão performando bem e POR QUÊ (criativo, público, oferta, momento)? O que fez essa campanha decolar?

4. 💰 REDISTRIBUIÇÃO DE VERBA — A verba está bem alocada? Quais campanhas merecem mais e quais merecem menos?

Analise escala, otimização financeira e plano de ação em português:

1. 🚀 CANDIDATAS A ESCALAR AGORA — Campanhas com performance sólida prontas para mais verba. Quanto aumentar e por quê?
2. 🛑 O QUE PAUSAR OU CORTAR — Campanhas/conjuntos que estão queimando verba. Seja específico com nomes e números.
3. 📈 SIMULAÇÃO DE IMPACTO — Se realocar verba dos itens a pausar para os candidatos de escala, qual seria o resultado estimado em ${objConfig.resultLabel||'compras'} e ROAS?

5. 📅 PLANO 30 DIAS — Semana 1: o que pausar/ajustar. Semana 2: o que lançar. Semana 3-4: o que escalar.`;

    return base;
  };

  const analyze=async(sec)=>{
    if(!anthropicKey){setRes('⚠️ Configure a Anthropic API Key em Configurações para usar o Cérebro.');return;}
    if(!allData.length){setRes('⚠️ Sem dados no período selecionado. Expanda o período de datas.');return;}

    setLoad(false);
  };

  const sections=[
    {k:'geral',l:'🧠 Análise Geral',desc:'Diagnóstico completo, melhores/piores campanhas, gargalos e ações imediatas'},

    {k:'escala',l:'🚀 Escala & Otimização',desc:'O que escalar, o que pausar, plano 30 dias'},

  return(<>
    <h2>🧠 Cérebro Gestor — Análise com IA</h2>

    {!anthropicKey&&<div className="notice" style={{marginBottom:'16px'}}>⚠️ Configure sua <strong>Anthropic API Key</strong> em Configurações para ativar o Cérebro.</div>}
    {!allData.length&&<div className="notice" style={{marginBottom:'16px'}}>⚠️ Sem dados no período. Selecione um período com dados ou configure o Windsor.</div>}
    {totalAutoAlerts>0&&<div style={{background:'rgba(99,102,241,.07)',border:'1px solid rgba(99,102,241,.2)',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px',fontSize:'12px',color:'#9ca3af',display:'flex',alignItems:'center',gap:'10px'}}>
      <span style={{fontSize:'16px'}}>🔗</span>

};
const ALL_DISCOVERABLE_FIELDS=Object.keys(KNOWN_ACTIONS_MAP);

const ClientesPage=({clients,onSave,windsorKey})=>{
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [addMode,setAddMode]=useState(false);
  const [newName,setNewName]=useState('');
  const [discoveringMeta,setDiscoveringMeta]=useState(false);
  const [discoveringGoogle,setDiscoveringGoogle]=useState(false);
  const [discoveredMeta,setDiscoveredMeta]=useState([]);
  const [discoveredGoogle,setDiscoveredGoogle]=useState([]);
  const [discoverErr,setDiscoverErr]=useState('');
  const [discoveringEvents,setDiscoveringEvents]=useState(false);
  const [discoveredEvents,setDiscoveredEvents]=useState([]);
  const [showEventPicker,setShowEventPicker]=useState(false);

  const startEdit=c=>{
    setEditId(c.id);
    setEditForm({facebook:[...(c.accounts?.facebook||[])],google_ads:[...(c.accounts?.google_ads||[])],objective:c.objective||'ecommerce',customEventLabel:c.customEventLabel||'',customEventField:c.customEventField||''});
    setDiscoveredMeta([]);setDiscoveredGoogle([]);setDiscoverErr('');
    setDiscoveredEvents([]);setShowEventPicker(false);
  };

  const discoverEvents=async(metaAccounts)=>{
    if(!windsorKey){setDiscoverErr('Configure a chave Windsor em Configurações primeiro.');return;}
    setDiscoveringEvents(true);setDiscoveredEvents([]);setDiscoverErr('');setShowEventPicker(false);
    try{
      const d1=subDays(today(),14);
      const accounts=metaAccounts&&metaAccounts.length?metaAccounts:[];
      const accountsParam=accounts.length?`&accounts=${accounts.join(',')}`:'';
      // Consulta em lotes para não ultrapassar limite de URL
      const BATCH=10;
      const totals={};
      const fieldsList=ALL_DISCOVERABLE_FIELDS;
      for(let i=0;i<fieldsList.length;i+=BATCH){
        const batch=fieldsList.slice(i,i+BATCH);
        const fields=['spend',...batch].join(',');
        const url=`https://connectors.windsor.ai/facebook?api_key=${windsorKey}&date_from=${d1}&date_to=${today()}&fields=${fields}${accountsParam}`;
        try{
          const res=await fetch(url);
          if(!res.ok)continue;
          const json=await res.json();
          const raw=json.result||json.data||(Array.isArray(json)?json:[]);
          if(!Array.isArray(raw))continue;
          batch.forEach(f=>{
            const sum=raw.reduce((acc,r)=>acc+(r[f]||0),0);
            if(sum>0)totals[f]=(totals[f]||0)+sum;
          });
        }catch{}
      }
      const found=Object.entries(totals)
        .filter(([,v])=>v>0)
        .sort((a,b)=>b[1]-a[1])
        .map(([f,v])=>({field:f,label:KNOWN_ACTIONS_MAP[f]||f,total:Math.round(v)}));
      if(found.length===0){
        setDiscoverErr('Nenhum evento encontrado. Tente ampliar o período ou verifique se as contas têm dados nos últimos 14 dias.');
      }else{
        setDiscoveredEvents(found);
        setShowEventPicker(true);
      }
    }catch(e){setDiscoverErr('Erro ao descobrir eventos: '+e.message);}
    setDiscoveringEvents(false);
  };
  const saveEdit=id=>{
    // Salva nomes junto com IDs para usar nos seletores da sidebar
    const metaNames={};
    (editForm.facebook||[]).forEach(accId=>{const f=discoveredMeta.find(a=>a.id===accId);if(f)metaNames[accId]=f.name;});
    const googleNames={};
    (editForm.google_ads||[]).forEach(accId=>{const f=discoveredGoogle.find(a=>a.id===accId);if(f)googleNames[accId]=f.name;});
    const acc={...editForm,facebookNames:{...(clients.find(c=>c.id===id)?.accounts?.facebookNames||{}),...metaNames},googleNames:{...(clients.find(c=>c.id===id)?.accounts?.googleNames||{}),...googleNames}};
    onSave(clients.map(c=>c.id===id?{...c,accounts:acc,objective:editForm.objective||'ecommerce',customEventLabel:editForm.customEventLabel||'',customEventField:editForm.customEventField||''}:c));
    setEditId(null);setDiscoveredMeta([]);setDiscoveredGoogle([]);setDiscoveredEvents([]);setShowEventPicker(false);
  };

  const fetchWindsorAccounts=async(connector,idField,nameField)=>{
    const d1=subDays(today(),3);
    const url=`https://connectors.windsor.ai/${connector}?api_key=${windsorKey}&date_from=${d1}&date_to=${today()}&fields=${idField},${nameField},spend`;
    const res=await fetch(url);
    if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(`Erro ${res.status}: ${t.slice(0,120)}`);}
    const json=await res.json();
    const raw=json.result||json.data||json;
    const rows=Array.isArray(raw)?raw:[];
    const map=new Map();
    rows.forEach(r=>{
      const id=r[idField];const name=r[nameField]||id;
      if(id&&!map.has(id))map.set(id,{id,name,spend:r.spend||0});
    });
    return [...map.values()].sort((a,b)=>b.spend-a.spend);
  };

  const discoverMeta=async()=>{
    if(!windsorKey){setDiscoverErr('Configure a chave Windsor em Configurações primeiro.');return;}
    setDiscoveringMeta(true);setDiscoveredMeta([]);setDiscoverErr('');
    try{
      const accounts=await fetchWindsorAccounts('facebook','account_id','account_name');
      if(accounts.length===0)setDiscoverErr('Nenhuma conta Meta encontrada.');
      else setDiscoveredMeta(accounts);
    }catch(e){setDiscoverErr('Meta: '+e.message);}
    setDiscoveringMeta(false);
  };

  const discoverGoogle=async()=>{
    if(!windsorKey){setDiscoverErr('Configure a chave Windsor em Configurações primeiro.');return;}
    setDiscoveringGoogle(true);setDiscoveredGoogle([]);setDiscoverErr('');
    try{
      // Google Ads usa customer_id / customer_name OU account_id / account_name — tenta os dois
      let accounts=await fetchWindsorAccounts('google_ads','customer_id','customer_name');
      if(accounts.length===0)accounts=await fetchWindsorAccounts('google_ads','account_id','account_name');
      if(accounts.length===0)setDiscoverErr('Nenhuma conta Google Ads encontrada.');

  const addClient=()=>{if(!newName.trim())return;onSave([...clients,{id:'c'+Date.now(),name:newName.trim(),emoji:'🎯',color:'#6366f1',accounts:{facebook:[],google_ads:[]}}]);setNewName('');setAddMode(false);};

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'14px'}}>
      {clients.map(c=>(
        <div key={c.id} className="card">

            <span style={{fontSize:'26px'}}>{c.emoji}</span>
            <div style={{flex:1}}><div style={{fontWeight:'600'}}>{c.name}</div><div style={{fontSize:'11px',color:'#4b5563'}}>ID: {c.id}</div></div>
            <button className="btn btn-danger btn-sm" onClick={()=>delClient(c.id)}>×</button>
          </div>
          {editId===c.id?(
            <div>
              {discoverErr&&<div style={{fontSize:'11px',color:'#f87171',marginBottom:'8px',padding:'5px 8px',background:'rgba(239,68,68,.08)',borderRadius:'4px'}}>{discoverErr}</div>}
              {/* Objetivo */}
              <div className="form-group">
                <label className="form-label">🎯 Objetivo da Conta</label>
                <select className="form-input" value={editForm.objective||'ecommerce'} onChange={e=>setEditForm({...editForm,objective:e.target.value})}>
                  <option value="ecommerce">🛒 E-commerce (Compras / ROAS)</option>
                  <option value="lead">📋 Lead / Formulário (Leads / Custo/Lead)</option>
                  <option value="message">💬 Mensagem (Conversas / Custo/Conversa)</option>

                      <button className="btn btn-secondary btn-sm" onClick={()=>discoverEvents(editForm.facebook||[])} disabled={discoveringEvents} style={{fontSize:'11px',padding:'3px 8px'}}>{discoveringEvents?'⏳ Descobrindo…':'🔍 Descobrir Eventos'}</button>
